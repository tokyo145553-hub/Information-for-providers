<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>気象防災速報(竜巻注意）</title>
<style>
    :root {
        --bg-color: #0b0f16;
        --card-bg: #0f1720;
        --text-color: #e6eef8;
        --button-bg: #003b80;
        --button-hover: #005acc;
        --button-success-bg: #28a745;
        --button-success-hover: #218838;
        --border-color: #333;
        --status-color: #66d18e;
        --shadow: 0 2px 5px rgba(0,0,0,0.3);
    }

    :root[data-theme="light"] {
        --bg-color: #f5f5f5;
        --card-bg: #ffffff;
        --text-color: #333;
        --button-bg: #0066cc;
        --button-hover: #0055aa;
        --button-success-bg: #28a745;
        --button-success-hover: #218838;
        --border-color: #ccc;
        --status-color: #28a745;
        --shadow: 0 2px 5px rgba(0,0,0,0.1);
    }

    @media (prefers-color-scheme: light) {
        :root:not([data-theme="dark"]) {
            --bg-color: #f5f5f5;
            --card-bg: #ffffff;
            --text-color: #333;
            --button-bg: #0066cc;
            --button-hover: #0055aa;
            --button-success-bg: #28a745;
            --button-success-hover: #218838;
            --border-color: #ccc;
            --status-color: #28a745;
            --shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
    }

    * { transition: background-color 180ms ease, color 180ms ease, border-color 180ms ease; }

    body { 
        font-family: sans-serif; 
        max-width: 900px; 
        margin: 40px auto; 
        padding: 20px; 
        background: var(--bg-color);
        color: var(--text-color);
    }

    #backBtn { 
        display: inline-block; 
        margin-bottom: 15px; 
        padding: 10px 16px; 
        background: var(--button-bg); 
        color: white; 
        text-decoration: none; 
        border-radius: 8px; 
        font-size: 14px; 
        font-weight: bold;
        transition: background 0.3s;
    }

    #backBtn:hover { 
        background: var(--button-hover); 
    }

    h1 { 
        text-align: center; 
        margin-top: 0;
        color: var(--text-color);
    }

    .buttons { 
        display: flex; 
        justify-content: center; 
        gap: 10px; 
        margin-bottom: 15px; 
    }

    button { 
        padding: 10px 18px; 
        font-size: 16px; 
        border: none; 
        border-radius: 8px; 
        cursor: pointer;
        background: var(--button-bg);
        color: white;
        transition: background 0.3s;
    }

    button:hover { 
        background: var(--button-hover);
    }

    #status { 
        text-align: center; 
        margin-bottom: 10px; 
        color: var(--status-color); 
        font-size: 14px; 
    }

    .report-card { 
        background: var(--card-bg); 
        border: 1px solid var(--border-color); 
        padding: 15px; 
        margin: 10px 0; 
        border-radius: 8px; 
        box-shadow: var(--shadow);
        color: var(--text-color);
    }

    .report-card h3 {
        color: var(--text-color);
        margin-top: 0;
    }

    .report-card p {
        color: var(--text-color);
        margin: 8px 0;
    }

    .copy-btn { 
        background: var(--button-success-bg); 
        color: white; 
        margin-top: 10px;
    }

    .copy-btn:hover { 
        background: var(--button-success-hover);
    }

    #result p {
        color: var(--text-color);
    }
</style>
</head>
<body>

<a href="index.html" id="backBtn">← トップへ戻る</a>
<h1>気象防災速報(竜巻注意）</h1>

<div class="buttons">
    <button onclick="getTatsumakiInfo()">🔄 一括更新</button>
</div>

<div id="status"></div>
<div id="result">読み込み待機中...</div>

<script>
async function getTatsumakiInfo() {
    const FEED_URL = "https://www.data.jma.go.jp/developer/xml/feed/extra.xml";
    const resultDiv = document.getElementById("result");
    const status = document.getElementById("status");

    try {
        resultDiv.innerHTML = "取得中...";
        status.textContent = "";

        const response = await fetch(FEED_URL);
        const text = await response.text();
        const parser = new DOMParser();
        const xmlDoc = parser.parseFromString(text, "text/xml");
        const entries = Array.from(xmlDoc.getElementsByTagName("entry"));

        const tornadoEntries = entries.filter(e => {
            const title = e.getElementsByTagName("title")[0]?.textContent || "";
            return title.includes("竜巻注意情報");
        }).slice(0, 5);

        if (tornadoEntries.length === 0) {
            resultDiv.innerHTML = "<p>現在、発表されている竜巻注意情報はありません。</p>";
            status.textContent = "最終確認: " + new Date().toLocaleString("ja-JP");
            return;
        }

        let htmlOutput = "";

        for (const entry of tornadoEntries) {
            const updated = entry.getElementsByTagName("updated")[0].textContent;
            const detailUrl = entry.getElementsByTagName("id")[0].textContent;
            const content = entry.getElementsByTagName("content")[0]?.textContent || "";
            
            const areaMatch = content.match(/^【(.*?)気象防災速報（竜巻注意）】/) || 
                            content.match(/^【(.*?)】/);
            const areaName = areaMatch ? areaMatch[1] : "不明";
            const bodyText = content.replace(/^【.*?】/, "").trim();
            const dateStr = new Date(updated).toLocaleString("ja-JP");

            // 詳細データの取得
            let reportNo = "不明";
            let validStr = "不明";

            try {
                const detailRes = await fetch(detailUrl);
                const detailText = await detailRes.text();
                const detailXml = parser.parseFromString(detailText, "text/xml");
                
                const serialNode = detailXml.getElementsByTagName("Serial")[0];
                if (serialNode) {
                    reportNo = serialNode.textContent;
                }
                
                const validNode = detailXml.getElementsByTagName("ValidDateTime")[0];
                if (validNode) {
                    const valid = validNode.textContent;
                    validStr = new Date(valid).toLocaleString("ja-JP");
                }
            } catch (e) {
                console.warn("詳細情報の取得に失敗:", e);
            }

            // 一件ずつコピーできるようにIDを付与
            const cardId = "card-" + reportNo + Math.floor(Math.random() * 10000);
            
            htmlOutput += `
            <div class="report-card" id="${cardId}">
                <h3>${areaName}竜巻注意情報 第${reportNo}号</h3>
                <div class="copy-content">
                    <p>${dateStr} 気象庁発表</p>
                    <p>${bodyText}</p>
                    <p><b>有効期限: ${validStr} まで</b></p>
                </div>
                <button class="copy-btn" onclick="copySingleInfo('${cardId}')">📋 この情報をコピー</button>
            </div>`;
        }

        resultDiv.innerHTML = htmlOutput;
        status.textContent = "最終更新: " + new Date().toLocaleString("ja-JP");

    } catch (e) {
        resultDiv.innerHTML = `<p>エラーが発生しました: ${e.message}</p>`;
        status.textContent = "取得失敗";
        console.error("詳細エラー:", e);
    }
}

// 一件ずつコピーする関数
function copySingleInfo(cardId) {
    const card = document.getElementById(cardId);
    const content = card.querySelector(".copy-content").innerText;
    const title = card.querySelector("h3").innerText;
    const fullText = `【${title}】\n${content}`;

    navigator.clipboard.writeText(fullText).then(() => {
        alert("コピーしました：\n" + title);
    }).catch(() => {
        alert("コピーに失敗しました");
    });
}

// index.htmlのテーマ設定と同期
(function(){
    const root = document.documentElement;
    const saved = localStorage.getItem('siteTheme');
    if (saved === 'dark' || saved === 'light') {
        root.setAttribute('data-theme', saved);
    } else {
        root.removeAttribute('data-theme');
    }
})();

getTatsumakiInfo();
</script>

</body>
</html>
