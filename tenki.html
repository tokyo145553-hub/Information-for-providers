<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>天気予報 | TokyoEastBranch</title>
<style>
    body { font-family: sans-serif; max-width: 900px; margin: 40px auto; padding: 20px; background: #f5f5f5; }
    #backBtn { display:inline-block; margin-bottom:15px; padding:10px 16px; background:#0066cc; color:white; text-decoration:none; border-radius:8px; font-weight:bold; }
    .buttons { display:flex; justify-content:center; gap:10px; margin-bottom:15px; }
    button { padding:12px 20px; border:none; border-radius:8px; cursor:pointer; background:#003b80; color:white; font-weight:bold; }
    #result { white-space:pre-wrap; background:white; border:1px solid #ccc; border-radius:10px; padding:20px; line-height:1.6; }
</style>
</head>
<body>

<a href="index.html" id="backBtn">← トップへ戻る</a>
<h1>天気予報</h1>

<div class="buttons">
    <button onclick="updateWeather(false)">シンプル版</button>
    <button onclick="updateWeather(true)">詳細版</button>
    <button onclick="copyInfo()">📋 コピー</button>
</div>
<div id="result">ボタンを押して更新してください。</div>

<script>
const POINTS = [
    { name: '□札幌 ', office: '016000' }, { name: '□仙台 ', office: '040000' },
    { name: '□東京 ', office: '130000' }, { name: '□名古屋', office: '230000' },
    { name: '□金沢 ', office: '170000' }, { name: '□大阪 ', office: '270000' },
    { name: '□広島 ', office: '340000' }, { name: '□福岡 ', office: '400000' },
    { name: '□那覇 ', office: '471000' }
];

async function updateWeather(isDetail) {
    const resDiv = document.getElementById("result");
    resDiv.textContent = "読み込み中...";

    try {
        const results = await Promise.all(POINTS.map(async p => {
            const res = await fetch(`https://www.jma.go.jp/bosai/forecast/data/forecast/${p.office}.json`);
            const data = await res.json();
            const wArea = data[0].timeSeries[0].areas[0];
            const pArea = data[0].timeSeries[1].areas[0];
            const tArea = data[0].timeSeries[2].areas[0];
            
            const tomorrow = shortWeather(wArea.weathers[1]);
            let line = `${p.name} ${emojiFlow(tomorrow)} ${tomorrow}`;
            
            if (isDetail) {
                const pops = (pArea.pops || []).slice(1).map(Number).filter(v => !isNaN(v));
                const popMax = pops.length ? Math.max(...pops) : '--';
                const minT = tArea.temps?.[0] ?? '--';
                const maxT = tArea.temps?.[1] ?? '--';
                line += `\n ${maxT}℃ / ${minT}℃ 降水確率 ${popMax}%`;
            }
            return line;
        }));
        
        resDiv.textContent = `≪天気予報≫\n明日\n\n${results.join('\n')}`;
    } catch(e) { resDiv.textContent = "データ取得エラー"; }
}

function shortWeather(text) {
    const clean = text.replace(/ /g, '');
    const matches = clean.match(/晴れ|くもり|雨|雪|雷/g) || [];
    if (matches.length < 2) return matches[0] || clean;
    return `${matches[0]}のち${matches[1]}`;
}

function emojiFlow(text) {
    const map = {'晴れ':'☀️', 'くもり':'☁️', '雨':'☔', '雪':'⛄', '雷':'⚡'};
    const words = text.match(/晴れ|くもり|雨|雪|雷/g) || [];
    const uniq = [...new Set(words)];
    return uniq.length === 1 ? (map[uniq[0]] || '') : `${map[uniq[0]] || ''}→${map[uniq[1]] || ''}`;
}

function copyInfo() {
    navigator.clipboard.writeText(document.getElementById("result").textContent);
    alert("コピーしました");
}
</script>
</body>
</html>
