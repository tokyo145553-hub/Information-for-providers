<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>線状降水帯予測 | 気象防災速報</title>

<style>
body{
    font-family:sans-serif;
    max-width:900px;
    margin:40px auto;
    padding:20px;
    background:#f5f5f5;
}

#backBtn{
    display:inline-block;
    margin-bottom:15px;
    padding:10px 16px;
    background:#0066cc;
    color:white;
    text-decoration:none;
    border-radius:8px;
    font-size:14px;
    font-weight:bold;
}

#backBtn:hover{
    background:#0055aa;
}

h1{
    text-align:center;
    margin-top:0;
}

.buttons{
    display:flex;
    justify-content:center;
    gap:10px;
    flex-wrap:wrap;
    margin-bottom:10px;
}

button{
    padding:10px 14px;
    font-size:14px;
    border:none;
    border-radius:8px;
    cursor:pointer;
}

button:hover{
    opacity:0.85;
}

.filterBar{
    display:flex;
    justify-content:center;
    gap:8px;
    flex-wrap:wrap;
    margin-bottom:15px;
}

.filterBtn{
    background:#ddd;
}

.filterBtn.active{
    background:#0066cc;
    color:#fff;
}

#status{
    text-align:center;
    margin-bottom:10px;
    color:green;
    font-size:14px;
}

#result{
    white-space:pre-line;
    background:white;
    border:1px solid #ccc;
    border-radius:10px;
    padding:20px;
    line-height:1.8;
    box-shadow:0 2px 5px rgba(0,0,0,0.1);
}
</style>
</head>

<body>

<a href="index.html" id="backBtn">← トップへ戻る</a>

<h1>線状降水帯予測（フィルター版）</h1>

<!-- フィルター -->
<div class="filterBar">
    <button class="filterBtn active" onclick="setFilter('all',event)">全体</button>
    <button class="filterBtn" onclick="setFilter('linear',event)">線状降水帯</button>
    <button class="filterBtn" onclick="setFilter('early',event)">半日前予測</button>
    <button class="filterBtn" onclick="setFilter('imminent',event)">直前</button>
    <button class="filterBtn" onclick="setFilter('danger',event)">危険度</button>
</div>

<div class="buttons">
    <button onclick="getInfo()">🔄 更新</button>
    <button onclick="copyInfo()">📋 コピー</button>
</div>

<div id="status"></div>
<div id="result">読み込み待機中...</div>

<script>

const FEED_URL =
"https://www.data.jma.go.jp/developer/xml/feed/extra.xml";

let currentFilter = "all";
let cachedText = "";

function setFilter(type, event){

    currentFilter = type;

    document.querySelectorAll(".filterBtn").forEach(b=>{
        b.classList.remove("active");
    });

    if(event && event.target){
        event.target.classList.add("active");
    }

    applyFilter();
}

function applyFilter(){

    if(!cachedText){
        return;
    }

    let text = cachedText;

    const lines = text.split("\n");

    if(currentFilter === "linear"){
        text = lines.filter(l =>
            l.includes("線状降水帯")
        ).join("\n");
    }

    if(currentFilter === "early"){
        text = lines.filter(l =>
            l.includes("半日前") ||
            l.includes("6時間") ||
            l.includes("3時間") ||
            l.includes("今後") ||
            l.includes("見込まれる")
        ).join("\n");
    }

    if(currentFilter === "imminent"){
        text = lines.filter(l =>
            l.includes("直前") ||
            l.includes("差し迫") ||
            l.includes("今後1") ||
            l.includes("今後3") ||
            l.includes("発生するおそれ") ||
            l.includes("急激に高まる")
        ).join("\n");
    }

    if(currentFilter === "danger"){
        text = lines.filter(l =>
            l.includes("警戒") ||
            l.includes("注意") ||
            l.includes("危険") ||
            l.includes("非常に激しい")
        ).join("\n");
    }

    document.getElementById("result").textContent =
        text || "該当情報なし";
}

async function getInfo(){

    const result = document.getElementById("result");
    const status = document.getElementById("status");

    try{

        result.textContent = "取得中...";
        status.textContent = "";

        const feedRes = await fetch(FEED_URL);
        const feedText = await feedRes.text();

        const parser = new DOMParser();
        const xml = parser.parseFromString(feedText,"text/xml");

        const entries = [...xml.getElementsByTagName("entry")];

        let target = entries.find(e=>{
            const t = e.getElementsByTagName("title")[0]?.textContent || "";
            return (
                t.includes("線状降水帯") ||
                t.includes("顕著な大雨") ||
                t.includes("気象情報")
            );
        });

        if(!target){
            result.textContent = "該当情報なし";
            return;
        }

        const link =
            target.getElementsByTagName("link")[0]?.getAttribute("href");

        const res = await fetch(link);
        const txt = await res.text();

        const xml2 = parser.parseFromString(txt,"text/xml");

        const texts = [...xml2.getElementsByTagName("Text")]
            .map(n=>n.textContent)
            .join("\n");

        cachedText =
`【${target.getElementsByTagName("title")[0]?.textContent || ""}】

${texts}`;

        applyFilter();

        status.textContent =
            "最終更新: " + new Date().toLocaleString("ja-JP");

    }catch(e){

        console.error(e);

        result.textContent =
`取得失敗

・CORS制限の可能性
・GitHub Pagesでは失敗する場合あり`;

    }
}

async function copyInfo(){

    await navigator.clipboard.writeText(
        document.getElementById("result").textContent
    );

    document.getElementById("status").textContent =
        "✅ コピーしました";
}

getInfo();

</script>

</body>
</html>
