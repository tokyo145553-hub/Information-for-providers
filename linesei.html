<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>線状降水帯予測</title>

<style>
body{
    font-family:sans-serif;
    max-width:900px;
    margin:40px auto;
    padding:20px;
    background:#f5f5f5;
}

#backBtn{
    display:inline-block;
    margin-bottom:15px;
    padding:10px 16px;
    background:#0066cc;
    color:white;
    text-decoration:none;
    border-radius:8px;
    font-size:14px;
    font-weight:bold;
}

#backBtn:hover{background:#0055aa;}

h1{text-align:center;margin-top:0;}

.buttons{
    display:flex;
    justify-content:center;
    gap:10px;
    margin-bottom:15px;
}

button{
    padding:10px 18px;
    font-size:16px;
    border:none;
    border-radius:8px;
    cursor:pointer;
}

#status{
    text-align:center;
    margin-bottom:10px;
    color:green;
    font-size:14px;
}

#result{
    white-space:pre-line;
    background:white;
    border:1px solid #ccc;
    border-radius:10px;
    padding:20px;
    line-height:1.8;
}
</style>
</head>

<body>

<a href="index.html" id="backBtn">← トップへ戻る</a>

<h1>線状降水帯予測</h1>

<div class="buttons">
    <button onclick="fetchData()">🔄 更新</button>
    <button onclick="copyData()">📋 コピー</button>
</div>

<div id="status"></div>
<div id="result">読み込み待機中...</div>

<script>

const FEED =
"https://www.data.jma.go.jp/developer/xml/feed/extra.xml";

async function fetchData(){

    const res = await fetch(FEED);
    const xml = await res.text();

    const parser = new DOMParser();
    const doc = parser.parseFromString(xml,"text/xml");

    const entries = [...doc.getElementsByTagName("entry")];

    const targets = entries.filter(e => {
        const id = e.getElementsByTagName("id")[0]?.textContent || "";
        const title = e.getElementsByTagName("title")[0]?.textContent || "";

        return (
            title.includes("線状降水帯") ||
            title.includes("大雨") ||
            title.includes("気象情報")
        );
    });

    let output = "";

    for(const e of targets){

        const title =
            e.getElementsByTagName("title")[0]?.textContent;

        const link =
            e.getElementsByTagName("link")[0]
            ?.getAttribute("href");

        const detailRes = await fetch(link);
        const detailText = await detailRes.text();
        const detailXml = parser.parseFromString(detailText,"text/xml");

        const body =
            detailXml.getElementsByTagName("Text")[0]
            ?.textContent || "本文なし";

        const pubTime =
            e.getElementsByTagName("updated")[0]
            ?.textContent || "";

        const isFuken = link.includes("VPFG");
        const isChiho = link.includes("VPFJ");
        const isZenpan = link.includes("VPZI");

        let header = "";

        if(isFuken){
            header = "【気象防災速報（線状降水帯直前予測）】";
        } else if(isChiho){
            header = "【地方気象解説情報（大雨・線状降水帯）】";
        } else if(isZenpan){
            header = "【全般気象解説情報（異常気象）】";
        }

        output +=
`${header}
${pubTime.replace("T"," ").replace("Z","")} 発表

${body}

------------------------

`;
    }

    document.getElementById("result").textContent =
        output || "該当データなし";

    document.getElementById("status").textContent =
        "最終更新: " +
        new Date().toLocaleString("ja-JP");
}

async function copyData(){
    const text = document.getElementById("result").textContent;
    await navigator.clipboard.writeText(text);
    alert("コピーしました");
}

fetchData();

</script>

</body>
</html>
