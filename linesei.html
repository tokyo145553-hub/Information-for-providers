<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>線状降水帯予測 | TokyoEastBranch</title>

<style>
body{
    font-family:sans-serif;
    max-width:900px;
    margin:40px auto;
    padding:20px;
    background:#f5f5f5;
}

#backBtn{
    display:inline-block;
    margin-bottom:15px;
    padding:10px 16px;
    background:#0066cc;
    color:white;
    text-decoration:none;
    border-radius:8px;
    font-size:14px;
    font-weight:bold;
}

#backBtn:hover{
    background:#0055aa;
}

h1{
    text-align:center;
    margin-top:0;
}

.buttons{
    display:flex;
    justify-content:center;
    gap:10px;
    margin-bottom:15px;
}

button{
    padding:10px 18px;
    font-size:16px;
    border:none;
    border-radius:8px;
    cursor:pointer;
}

button:hover{
    opacity:0.85;
}

#status{
    text-align:center;
    margin-bottom:10px;
    color:green;
    font-size:14px;
}

#result{
    white-space:pre-line;
    background:white;
    border:1px solid #ccc;
    border-radius:10px;
    padding:20px;
    line-height:1.8;
    box-shadow:0 2px 5px rgba(0,0,0,0.1);
}
</style>
</head>

<body>

<a href="index.html" id="backBtn">← トップへ戻る</a>

<h1>線状降水帯予測（気象防災速報）</h1>

<div class="buttons">
    <button onclick="getInfo()">🔄 更新</button>
    <button onclick="copyInfo()">📋 コピー</button>
</div>

<div id="status"></div>
<div id="result">読み込み待機中...</div>

<script>

const FEED_URL = "https://www.data.jma.go.jp/developer/xml/feed/extra.xml";

async function getInfo(){

    const result = document.getElementById("result");
    const status = document.getElementById("status");

    try{
        result.textContent = "取得中...";
        status.textContent = "";

        const feedRes = await fetch(FEED_URL);
        const feedText = await feedRes.text();

        const parser = new DOMParser();
        const feedXml = parser.parseFromString(feedText,"text/xml");

        const entries = [...feedXml.getElementsByTagName("entry")];

        // 🌧 線状降水帯系キーワード検出
        const target = entries.find(e=>{
            const title = e.getElementsByTagName("title")[0]?.textContent || "";
            return title.includes("線状降水帯") ||
                   title.includes("顕著な大雨") ||
                   title.includes("気象情報");
        });

        if(!target){
            result.textContent =
`【線状降水帯予測】
現在、該当する情報はありません`;
            status.textContent = "最終更新: " + new Date().toLocaleString("ja-JP");
            return;
        }

        const link = target.getElementsByTagName("link")[0]?.getAttribute("href");

        const detailRes = await fetch(link);
        const detailText = await detailRes.text();

        const detailXml = parser.parseFromString(detailText,"text/xml");

        const title = target.getElementsByTagName("title")[0]?.textContent || "不明";

        // 本文取得（comment）
        const comment =
            detailXml.querySelector("comment")?.textContent ||
            detailXml.querySelector("body")?.textContent ||
            "情報なし";

        result.textContent =
`【線状降水帯予測／気象防災速報】

${title}

――――――――――――
${comment}`;

        status.textContent =
            "最終更新: " + new Date().toLocaleString("ja-JP");

    }catch(e){

        console.error(e);

        result.textContent =
`取得失敗

・気象庁XMLのCORS制限
・または該当電文未配信の可能性`;

        status.textContent = "エラー";
    }
}

async function copyInfo(){
    const text = document.getElementById("result").textContent;

    try{
        await navigator.clipboard.writeText(text);
        const status = document.getElementById("status");
        status.textContent = "コピーしました";

        setTimeout(()=>{
            status.textContent = "最終更新: " + new Date().toLocaleString("ja-JP");
        },1500);

    }catch{
        alert("コピー失敗");
    }
}

getInfo();

</script>

</body>
</html>
