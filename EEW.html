<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>緊急地震速報 | TokyoEastBranch</title>

<style>
:root{
    --primary:#003b80;
    --bg:#f4f7fb;
}

body{
    margin:0;
    font-family:"Yu Gothic","Meiryo",sans-serif;
    background:var(--bg);
    color:#222;
}

/* HEADER（台風風） */
header{
    background:linear-gradient(135deg,#001f4d,#003b80);
    color:#fff;
    padding:18px;
    text-align:center;
}

header h1{
    margin:0;
    font-size:20px;
}
header p{
    margin:5px 0 0;
    font-size:12px;
    opacity:0.8;
}

/* CONTAINER */
.container{
    max-width:900px;
    margin:20px auto;
    padding:0 12px;
}

/* STATUS CARD */
.status-card{
    background:#fff;
    border-radius:12px;
    padding:12px;
    margin-bottom:12px;
    box-shadow:0 3px 8px rgba(0,0,0,0.08);
    font-size:13px;
}

/* INFO GRID（台風の実況っぽい） */
.info-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px;
    margin-bottom:12px;
}

.box{
    background:#fff;
    border-radius:12px;
    padding:12px;
    box-shadow:0 3px 8px rgba(0,0,0,0.08);
}

.box h3{
    margin:0 0 5px;
    font-size:12px;
    color:#666;
}

.box p{
    margin:0;
    font-weight:bold;
}

/* OUTPUT */
textarea{
    width:100%;
    height:260px;
    border:none;
    border-radius:12px;
    padding:12px;
    font-weight:bold;
    font-size:14px;
    line-height:1.5;
    background:#111;
    color:#fff;
    box-shadow:0 3px 8px rgba(0,0,0,0.2);
}

/* BUTTON */
.buttons{
    margin-top:10px;
}

button{
    padding:10px 14px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-weight:bold;
}

#updateBtn{
    background:#0066cc;
    color:#fff;
}

#copyBtn{
    background:#444;
    color:#fff;
}

/* ALERT */
.warning{
    background:#ff4d4d !important;
    color:#000 !important;
}

.cancel{
    background:#666 !important;
    color:#fff !important;
}

</style>
</head>

<body>

<header>
    <h1>緊急地震速報</h1>
    <p>EEW / TokyoEastBranch</p>
</header>

<div class="container">

    <!-- ステータス -->
    <div class="status-card" id="status">未取得</div>

    <!-- 情報カード群（台風風） -->
    <div class="info-grid">

        <div class="box">
            <h3>震源地</h3>
            <p id="region">-</p>
        </div>

        <div class="box">
            <h3>最大震度</h3>
            <p id="intensity">-</p>
        </div>

        <div class="box">
            <h3>マグニチュード</h3>
            <p id="magnitude">-</p>
        </div>

        <div class="box">
            <h3>深さ</h3>
            <p id="depth">-</p>
        </div>

    </div>

    <!-- 本文 -->
    <textarea id="output">更新してください</textarea>

    <div class="buttons">
        <button id="updateBtn">更新</button>
        <button id="copyBtn">コピー</button>
    </div>

</div>

<script>

let lastId=null;

async function loadEEW(){

try{

const res = await fetch("https://api.wolfx.jp/jma_eew.json?t="+Date.now());
const raw = await res.json();

if(!raw) return;

const reportNum = raw.report_num ?? raw.Serial ?? "-";
if(reportNum===lastId) return;
lastId=reportNum;

const region = raw.region_name ?? raw.Hypocenter ?? "-";
const intensity = raw.calcintensity ?? raw.MaxIntensity ?? "-";
const magnitude = raw.magunitude ?? raw.Magunitude ?? "-";
const depth = raw.depth ?? raw.Depth ?? "-";
const origin = raw.origin_time ?? raw.OriginTime ?? "-";

const alertRaw = raw.alertflg ?? raw.AlertFlg ?? raw.isWarn;

const isWarning =
    String(alertRaw).toLowerCase()==="警報" ||
    String(alertRaw).toLowerCase()==="warning" ||
    String(alertRaw)==="1";

const isCancel = raw.is_cancel ?? raw.isCancel ?? false;
const isFinal = raw.is_final ?? raw.isFinal ?? false;

/* UI反映（台風風） */
document.getElementById("region").textContent = region;
document.getElementById("intensity").textContent = intensity;
document.getElementById("magnitude").textContent = "M"+magnitude;
document.getElementById("depth").textContent = depth+"km";

const status = document.getElementById("status");
const output = document.getElementById("output");

let text="";

if(isCancel){

text=`【緊急地震速報（取消）】

この速報は取り消されました。

出典:WolfxAPI`;

output.classList.add("cancel");
output.classList.remove("warning");

status.textContent="取消報";

}else{

const type = isWarning
? "🚨緊急地震速報（警報）🚨"
: "緊急地震速報（予報）";

const final = isFinal ? "（最終報）" : "";

text=`【${type}】
# 第${reportNum}報${final}

震源地：${region}
最大震度：${intensity}
M${magnitude}
深さ：${depth}km
発生時刻：${origin}

出典:WolfxAPI`;

if(isWarning){
    output.classList.add("warning");
    output.classList.remove("cancel");
}else{
    output.classList.remove("warning","cancel");
}

status.textContent=`第${reportNum}報 / ${new Date().toLocaleTimeString()}`;

}

output.value=text;

}

/* 手動更新 */
document.getElementById("updateBtn").onclick=loadEEW;

/* コピー */
document.getElementById("copyBtn").onclick=()=>{
navigator.clipboard.writeText(document.getElementById("output").value);
};

</script>

</body>
</html>
