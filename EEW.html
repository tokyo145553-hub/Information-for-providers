<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>緊急地震速報</title>

<style>
body{
    font-family:sans-serif;
    max-width:900px;
    margin:40px auto;
    padding:20px;
    background:#f5f5f5;
}

#backBtn{
    display:inline-block;
    margin-bottom:15px;
    padding:10px 16px;
    background:#0066cc;
    color:white;
    text-decoration:none;
    border-radius:8px;
    font-size:14px;
    font-weight:bold;
}

#backBtn:hover{
    background:#0055aa;
}

h1{
    text-align:center;
    margin-top:0;
}

/* ボタン */
.buttons{
    display:flex;
    justify-content:center;
    gap:10px;
    margin-bottom:15px;
}

button{
    padding:10px 18px;
    font-size:16px;
    border:none;
    border-radius:8px;
    cursor:pointer;
}

button:hover{
    opacity:0.85;
}

#status{
    text-align:center;
    margin-bottom:10px;
    color:green;
    font-size:14px;
}

/* 台風UI風ボックス */
#result{
    white-space:pre-line;
    background:white;
    border:1px solid #ccc;
    border-radius:10px;
    padding:20px;
    line-height:1.8;
    box-shadow:0 2px 5px rgba(0,0,0,0.1);
    font-weight:bold;
}
</style>
</head>

<body>

<a href="index.html" id="backBtn">← トップへ戻る</a>

<h1>緊急地震速報</h1>

<div class="buttons">
    <button onclick="loadEEW()">🔄 更新</button>
    <button onclick="copyInfo()">📋 コピー</button>
</div>

<div id="status">待機中</div>

<div id="result">未取得</div>

<script>

let lastId = null;

async function loadEEW(){

    const url = "https://api.wolfx.jp/jma_eew.json?t=" + Date.now();

    const result = document.getElementById("result");
    const status = document.getElementById("status");

    try{

        status.textContent = "取得中...";
        
        const res = await fetch(url);
        const raw = await res.json();

        if(!raw){
            result.textContent = "データなし";
            return;
        }

        const id = raw.report_num ?? raw.Serial ?? "-";
        if(id === lastId){
            status.textContent = "更新なし";
            return;
        }
        lastId = id;

        const region = raw.region_name ?? raw.Hypocenter ?? "-";
        const intensity = raw.calcintensity ?? raw.MaxIntensity ?? "-";
        const mag = raw.magunitude ?? raw.Magunitude ?? "-";
        const depth = raw.depth ?? raw.Depth ?? "-";
        const time = raw.origin_time ?? raw.OriginTime ?? "-";

        const alert = raw.alertflg ?? raw.AlertFlg ?? raw.isWarn;
        const isWarning =
            String(alert).toLowerCase() === "警報" ||
            String(alert).toLowerCase() === "warning" ||
            String(alert) === "1" ||
            String(alert) === "true";

        const isCancel = raw.is_cancel ?? raw.isCancel ?? false;

        let text = "";

        if(isCancel){

            text =
`【緊急地震速報（取消）】

先ほどの情報は取り消されました。`;

            result.style.background = "#666";
            result.style.color = "#fff";

        }else{

            const title = isWarning
                ? "🚨緊急地震速報（警報）🚨"
                : "緊急地震速報（予報）";

            text =
`【${type}】
# 第${reportNum}報${final}

震源地　${region}
推定最大震度　${intensity}
地震の規模　M${magnitude}
震源の深さ　${depth}km

${origin}発生

出典WolfxAPI`;
            if(isWarning){
                result.style.background = "#ff4d4d";
                result.style.color = "#000";
            }else{
                result.style.background = "#ffffff";
                result.style.color = "#000";
            }
        }

        result.textContent = text;
        status.textContent = "更新: " + new Date().toLocaleTimeString();

    }catch(e){

        result.textContent = "取得失敗（APIエラー or CORS）";
        status.textContent = "エラー";
        console.log(e);
    }
}

function copyInfo(){
    navigator.clipboard.writeText(
        document.getElementById("result").textContent
    );
}

</script>

</body>
</html>
