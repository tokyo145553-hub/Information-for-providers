<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>緊急地震速報 | TokyoEastBranch</title>
<style>
    :root {
        --bg-color: #0b0f16;
        --card-bg: #0f1720;
        --text-color: #e6eef8;
        --button-bg: #003b80;
        --button-hover: #005acc;
        --border-color: #333;
        --shadow: 0 2px 5px rgba(0,0,0,0.3);
    }

    :root[data-theme="light"] {
        --bg-color: #f5f5f5;
        --card-bg: #ffffff;
        --text-color: #333;
        --button-bg: #0066cc;
        --button-hover: #0052a3;
        --border-color: #ccc;
        --shadow: 0 2px 5px rgba(0,0,0,0.1);
    }

    @media (prefers-color-scheme: light) {
        :root:not([data-theme="dark"]) {
            --bg-color: #f5f5f5;
            --card-bg: #ffffff;
            --text-color: #333;
            --button-bg: #0066cc;
            --button-hover: #0052a3;
            --border-color: #ccc;
            --shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
    }

    * { transition: background-color 180ms ease, color 180ms ease, border-color 180ms ease; }

    body { 
        font-family: sans-serif; 
        max-width: 900px; 
        margin: 40px auto; 
        padding: 20px; 
        background: var(--bg-color);
        color: var(--text-color);
    }

    #backBtn { 
        display: inline-block;
        margin-bottom: 15px; 
        padding: 10px 16px; 
        background: var(--button-bg); 
        color: white; 
        text-decoration: none; 
        border-radius: 8px; 
        font-weight: bold;
    }

    .buttons { 
        display: flex; 
        justify-content: center; 
        gap: 10px; 
        margin-bottom: 15px; 
    }

    button { 
        padding: 10px 18px; 
        font-size: 16px; 
        border: none; 
        border-radius: 8px; 
        cursor: pointer; 
        background: var(--button-bg); 
        color: white;
    }
    button:hover { background: var(--button-hover); }

    #status { 
        text-align: center; 
        margin-bottom: 10px; 
        font-weight: bold; 
        color: var(--text-color);
    }

    #result { 
        white-space: pre-line; 
        background: var(--card-bg); 
        border: 1px solid var(--border-color); 
        border-radius: 10px; 
        padding: 20px; 
        line-height: 1.8; 
        box-shadow: var(--shadow); 
        font-weight: bold; 
        transition: background 0.3s, color 0.3s;
        color: var(--text-color);
    }
</style>
</head>
<body>

<a href="index.html" id="backBtn">← トップへ戻る</a>
<h1>緊急地震速報</h1>

<div class="buttons">
    <button onclick="loadEEW()">🔄 更新</button>
    <button onclick="copyInfo()">📋 コピー</button>
</div>

<div id="status">待機中</div>
<div id="result">情報を取得中...</div>

<script>
let lastId = null;

async function loadEEW() {
    const result = document.getElementById("result");
    const status = document.getElementById("status");
    
    try {
        const res = await fetch("https://api.wolfx.jp/jma_eew.json?t=" + Date.now());
        const raw = await res.json();
        if (!raw) return;

        const id = raw.report_num ?? raw.Serial ?? "-";
        if (id === lastId && lastId !== null) {
            status.textContent = "最新情報です";
            return;
        }
        lastId = id;

        // 判定ロジック
        const isCancel = raw.is_cancel ?? raw.isCancel ?? false;
        const alertRaw = raw.alertflg ?? raw.AlertFlg ?? raw.isWarn;
        const isWarning = String(alertRaw).toLowerCase() === "警報" || String(alertRaw).toLowerCase() === "warning" || String(alertRaw) === "1" || String(alertRaw) === "true";
        const isFinal = raw.is_final ?? raw.isFinal ?? false;

        let text = "";
        if (isCancel) {
            text = "【緊急地震速報（取消）】\n\n先ほどの速報は取り消されました。";
            result.style.background = "#555";
            result.style.color = "#fff";
        } else {
            const type = isWarning ? "🚨緊急地震速報（警報）🚨" : "緊急地震速報（予報）";
            
            // マグニチュードの処理（数値なら小数点第一位まで表示）
            const magRaw = raw.magunitude ?? raw.Magunitude;
            const mag = (typeof magRaw === 'number') ? magRaw.toFixed(1) : (magRaw ?? "-");

            text = `【${type}】\n# 第${id}報${isFinal ? "（最終報）" : ""}\n\n震源地　${raw.region_name ?? raw.Hypocenter ?? "-"}\n推定最大震度　${raw.calcintensity ?? raw.MaxIntensity ?? "-"}\n地震の規模　M${mag}\n震源の深さ　${raw.depth ?? raw.Depth ?? "-"}km\n\n${raw.origin_time ?? raw.OriginTime ?? "-"}発生\n\n出典:WolfxAPI`;
            
            // スタイル適用
            if (isWarning) {
                result.style.background = "#ff4d4d";
                result.style.color = "#000";
            } else {
                result.style.background = "var(--card-bg)";
                result.style.color = "var(--text-color)";
            }
        }

        result.textContent = text;
        status.textContent = "最終更新: " + new Date().toLocaleTimeString();
    } catch(e) {
        status.textContent = "取得エラー";
        console.error(e);
    }
}

function copyInfo() {
    navigator.clipboard.writeText(document.getElementById("result").textContent);
    alert("コピーしました");
}

// index.htmlのテーマ設定と同期
(function(){
    const root = document.documentElement;
    const saved = localStorage.getItem('siteTheme');
    if (saved === 'dark' || saved === 'light') {
        root.setAttribute('data-theme', saved);
    } else {
        root.removeAttribute('data-theme');
    }
})();

// 自動更新（2秒間隔）
loadEEW();
setInterval(loadEEW, 2000);
</script>

</body>
</html>
