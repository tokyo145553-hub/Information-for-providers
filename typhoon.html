<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>台風情報</title>

<style>
    :root {
        --bg-color: #0b0f16;
        --card-bg: #0f1720;
        --text-color: #e6eef8;
        --button-bg: #003b80;
        --button-hover: #005acc;
        --border-color: #333;
        --status-color: #66d18e;
        --shadow: 0 2px 5px rgba(0,0,0,0.3);
    }

    :root[data-theme="light"] {
        --bg-color: #f5f5f5;
        --card-bg: #ffffff;
        --text-color: #333;
        --button-bg: #0066cc;
        --button-hover: #0055aa;
        --border-color: #ccc;
        --status-color: #28a745;
        --shadow: 0 2px 5px rgba(0,0,0,0.1);
    }

    @media (prefers-color-scheme: light) {
        :root:not([data-theme="dark"]) {
            --bg-color: #f5f5f5;
            --card-bg: #ffffff;
            --text-color: #333;
            --button-bg: #0066cc;
            --button-hover: #0055aa;
            --border-color: #ccc;
            --status-color: #28a745;
            --shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
    }

    * { transition: background-color 180ms ease, color 180ms ease, border-color 180ms ease; }

    body {
        font-family: sans-serif;
        max-width: 900px;
        margin: 40px auto;
        padding: 20px;
        background: var(--bg-color);
        color: var(--text-color);
    }

    #backBtn {
        display: inline-block;
        margin-bottom: 15px;
        padding: 10px 16px;
        background: var(--button-bg);
        color: white;
        text-decoration: none;
        border-radius: 8px;
        font-size: 14px;
        font-weight: bold;
        transition: background 0.3s;
    }

    #backBtn:hover {
        background: var(--button-hover);
    }

    h1 {
        text-align: center;
        margin-top: 0;
        color: var(--text-color);
    }

    .buttons {
        display: flex;
        justify-content: center;
        gap: 10px;
        margin-bottom: 15px;
    }

    button {
        padding: 10px 18px;
        font-size: 16px;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        background: var(--button-bg);
        color: white;
        transition: background 0.3s;
    }

    button:hover {
        background: var(--button-hover);
    }

    .copyBtn {
        padding: 6px 14px;
        font-size: 14px;
    }

    #status {
        text-align: center;
        margin-bottom: 10px;
        color: var(--status-color);
        font-size: 14px;
    }

    .typhoon-item {
        margin-bottom: 20px;
    }

    .copy-wrap {
        display: flex;
        justify-content: flex-end;
        margin-bottom: 6px;
    }

    .result {
        white-space: pre-line;
        background: var(--card-bg);
        border: 1px solid var(--border-color);
        border-radius: 10px;
        padding: 20px;
        line-height: 1.8;
        box-shadow: var(--shadow);
        color: var(--text-color);
    }
</style>
</head>
<body>

<a href="index.html" id="backBtn">
← トップへ戻る
</a>

<h1>台風情報</h1>

<div class="buttons">
    <button onclick="getTyphoonInfo()">🔄 更新</button>
</div>

<div id="status"></div>

<div id="result">読み込み待機中...</div>

<script>

async function getTyphoonInfo() {

    const FEED_URL =
        "https://www.data.jma.go.jp/developer/xml/feed/extra.xml";

    const result =
        document.getElementById("result");

    const status =
        document.getElementById("status");

    try {

        result.textContent = "取得中...";
        status.textContent = "";

        const feedRes =
            await fetch(FEED_URL);

        const feedText =
            await feedRes.text();

        const parser =
            new DOMParser();

        const feedXml =
            parser.parseFromString(feedText, "text/xml");

        const entries =
            [...feedXml.getElementsByTagName("entry")];

        const typhoonEntries = [];
        const seenLinks = new Set();

        // 第1パス: 実況
        for (const entry of entries) {
            if (typhoonEntries.length >= 3) break;
            const title =
                entry.getElementsByTagName("title")[0]?.textContent || "";
            const link =
                entry.getElementsByTagName("link")[0]?.getAttribute("href");
            if (title.includes("台風") &&
                title.includes("実況") &&
                link &&
                !seenLinks.has(link)) {
                seenLinks.add(link);
                typhoonEntries.push(entry);
            }
        }

        // 第2パス: 予報
        if (typhoonEntries.length < 3) {
            for (const entry of entries) {
                if (typhoonEntries.length >= 3) break;
                const title =
                    entry.getElementsByTagName("title")[0]?.textContent || "";
                const link =
                    entry.getElementsByTagName("link")[0]?.getAttribute("href");
                if (title.includes("台風") &&
                    title.includes("予報") &&
                    link &&
                    !seenLinks.has(link)) {
                    seenLinks.add(link);
                    typhoonEntries.push(entry);
                }
            }
        }

        if (typhoonEntries.length === 0) {

            result.innerHTML =
                `<div class="result">【台風情報】
現在、台風情報はありません</div>`;

            status.textContent =
                "最終更新: " +
                new Date().toLocaleString("ja-JP");

            return;
        }

        const details =
            await Promise.all(
                typhoonEntries.map(async entry => {

                    const link =
                        entry
                        .getElementsByTagName("link")[0]
                        .getAttribute("href");

                    const detailRes =
                        await fetch(link);

                    const detailText =
                        await detailRes.text();

                    const detailXml =
                        parser.parseFromString(detailText, "text/xml");

                    let number = "";
                    let name = "不明";
                    let size = "--";
                    let intensity = "--";
                    let pressure = "不明";
                    let wind = "―";
                    let gust = "―";
                    let direction = "不明";
                    let speedText = "不明";
                    let area = "不明";

                    const numberNode =
                        detailXml.querySelector("Number");

                    if (numberNode) {
                        const raw = numberNode.textContent;
                        number = parseInt(raw.slice(-2), 10);
                    }

                    const nameNode =
                        detailXml.querySelector("Name");

                    if (nameNode) {
                        name = nameNode.textContent;
                    }

                    const info =
                        detailXml.querySelector("MeteorologicalInfo");

                    if (info) {

                        const areaClass =
                            info.querySelector("AreaClass");

                        if (areaClass?.textContent) {
                            size = areaClass.textContent;
                        }

                        const intensityClass =
                            info.querySelector("IntensityClass");

                        if (intensityClass?.textContent) {
                            intensity = intensityClass.textContent;
                        }

                        const location =
                            info.querySelector("CenterPart Location");

                        if (location?.textContent) {
                            area = location.textContent;
                        }

                        const pressureNode =
                            info.querySelector("Pressure");

                        if (pressureNode?.textContent) {
                            pressure = pressureNode.textContent;
                        }

                        const directionNode =
                            info.querySelector("Direction");

                        if (directionNode?.textContent) {
                            direction = directionNode.textContent;
                        }

                        const speedNode =
                            [...info.querySelectorAll("Speed")]
                            .find(x =>
                                x.getAttribute("unit") === "km/h"
                            );

                        if (speedNode) {

                            const speed =
                                speedNode.textContent;

                            const desc =
                                speedNode.getAttribute("description");

                            if (desc?.includes("ゆっくり")) {
                                speedText = "ゆっくり";
                            } else if (
                                desc?.includes("ほとんど停滞")
                            ) {
                                speedText = "ほとんど停滞";
                            } else {
                                speedText = speed + " km/h";
                            }
                        }

                        const windNodes =
                            [...info.querySelectorAll("WindSpeed")];

                        windNodes.forEach(node => {

                            const unit =
                                node.getAttribute("unit");

                            const type =
                                node.getAttribute("type") || "";

                            if (
                                unit === "m/s" &&
                                (!type || type.includes("最大風速"))
                            ) {
                                wind = node.textContent;
                            }

                            if (
                                unit === "m/s" &&
                                type.includes("最大瞬間風速")
                            ) {
                                gust = node.textContent;
                            }
                        });
                    }

                    return {
                        number,
                        name,
                        size,
                        intensity,
                        pressure,
                        wind,
                        gust,
                        direction,
                        speedText,
                        area
                    };
                })
            );

        result.innerHTML =
            details.map((t, i) => {

                const text =
`【台風情報】
台風${t.number}号
台風名　${t.name}
大きさ　${t.size}
強さ　${t.intensity}
存在地域　${t.area}
中心気圧　${t.pressure} hPa
最大風速　${t.wind} m/s
最大瞬間風速　${t.gust} m/s
移動方向　${t.direction}
移動速度　${t.speedText}`;

                const escaped =
                    text.replace(/&/g, "&amp;")
                        .replace(/</g, "&lt;")
                        .replace(/>/g, "&gt;");

                return `
<div class="typhoon-item">
    <div class="copy-wrap">
        <button class="copyBtn" onclick="copyInfo(${i})">📋 コピー</button>
    </div>
    <div class="result" id="typhoon-${i}">${escaped}</div>
</div>`;
            }).join("");

        // テキストを保存
        window.typhoonTexts =
            details.map(t =>
`【台風情報】
台風${t.number}号
台風名　${t.name}
大きさ　${t.size}
強さ　${t.intensity}
存在地域　${t.area}
中心気圧　${t.pressure} hPa
最大風速　${t.wind} m/s
最大瞬間風速　${t.gust} m/s
移動方向　${t.direction}
移動速度　${t.speedText}`
            );

        status.textContent =
            "最終更新: " +
            new Date().toLocaleString("ja-JP");

    } catch(error) {

        console.error(error);

        result.innerHTML =
            `<div class="result">データ取得に失敗しました

GitHub Pagesでは
気象庁XMLのCORS制限により
取得できない場合があります。</div>`;

        status.textContent = "取得失敗";
    }
}

async function copyInfo(index) {

    const text =
        window.typhoonTexts[index];

    try {

        await navigator.clipboard.writeText(text);

        const status =
            document.getElementById("status");

        status.textContent =
            "✅ コピーしました";

        setTimeout(() => {

            status.textContent =
                "最終更新: " +
                new Date().toLocaleString("ja-JP");

        }, 2000);

    } catch {

        alert("コピーに失敗しました");
    }
}

// index.htmlのテーマ設定と同期
(function(){
    const root = document.documentElement;
    const saved = localStorage.getItem('siteTheme');
    if (saved === 'dark' || saved === 'light') {
        root.setAttribute('data-theme', saved);
    } else {
        root.removeAttribute('data-theme');
    }
})();

getTyphoonInfo();

</script>

</body>
</html>
