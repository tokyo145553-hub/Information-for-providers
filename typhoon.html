<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>台風情報</title>

<style>
body{
    font-family:sans-serif;
    max-width:900px;
    margin:40px auto;
    padding:20px;
    background:#f5f5f5;
}

#backBtn{
    display:inline-block;
    margin-bottom:15px;
    padding:10px 16px;
    background:#0066cc;
    color:white;
    text-decoration:none;
    border-radius:8px;
    font-size:14px;
    font-weight:bold;
}

#backBtn:hover{
    background:#0055aa;
}

h1{
    text-align:center;
    margin-top:0;
}

.buttons{
    display:flex;
    justify-content:center;
    gap:10px;
    margin-bottom:15px;
}

button{
    padding:10px 18px;
    font-size:16px;
    border:none;
    border-radius:8px;
    cursor:pointer;
}

button:hover{
    opacity:0.85;
}

.copyBtn{
    padding:6px 14px;
    font-size:14px;
}

#status{
    text-align:center;
    margin-bottom:10px;
    color:green;
    font-size:14px;
}

.typhoon-item{
    margin-bottom:30px;
}

.copy-wrap{
    display:flex;
    justify-content:flex-end;
    gap:8px;
    margin-bottom:6px;
}

.result{
    white-space:pre-line;
    background:white;
    border:1px solid #ccc;
    border-radius:10px;
    padding:20px;
    line-height:1.8;
    box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

.image-container{
    background:white;
    border:1px solid #ccc;
    border-radius:10px;
    padding:15px;
    margin-bottom:15px;
    box-shadow:0 2px 5px rgba(0,0,0,0.1);
    text-align:center;
}

.image-container canvas{
    max-width:100%;
    height:auto;
    display:block;
    margin:0 auto 10px;
    border:1px solid #ddd;
}

.image-buttons{
    display:flex;
    gap:8px;
    justify-content:center;
}

.downloadBtn, .shareBtn{
    padding:8px 14px;
    font-size:14px;
    background:#28a745;
    color:white;
    border:none;
    border-radius:6px;
    cursor:pointer;
}

.downloadBtn:hover, .shareBtn:hover{
    opacity:0.85;
}
</style>
</head>
<body>

<a href="index.html" id="backBtn">
← トップへ戻る
</a>

<h1>台風情報</h1>

<div class="buttons">
    <button onclick="getTyphoonInfo()">🔄 更新</button>
</div>

<div id="status"></div>

<div id="result">読み込み待機中...</div>

<script>

async function getTyphoonInfo() {

    const FEED_URL =
        "https://www.data.jma.go.jp/developer/xml/feed/extra.xml";

    const result =
        document.getElementById("result");

    const status =
        document.getElementById("status");

    try {

        result.textContent = "取得中...";
        status.textContent = "";

        const feedRes =
            await fetch(FEED_URL);

        const feedText =
            await feedRes.text();

        const parser =
            new DOMParser();

        const feedXml =
            parser.parseFromString(feedText, "text/xml");

        const entries =
            [...feedXml.getElementsByTagName("entry")];

        const typhoonEntries = [];
        const seenLinks = new Set();

        // 第1パス: 実況
        for (const entry of entries) {
            if (typhoonEntries.length >= 3) break;
            const title =
                entry.getElementsByTagName("title")[0]?.textContent || "";
            const link =
                entry.getElementsByTagName("link")[0]?.getAttribute("href");
            if (title.includes("台風") &&
                title.includes("実況") &&
                link &&
                !seenLinks.has(link)) {
                seenLinks.add(link);
                typhoonEntries.push(entry);
            }
        }

        // 第2パス: 予報
        if (typhoonEntries.length < 3) {
            for (const entry of entries) {
                if (typhoonEntries.length >= 3) break;
                const title =
                    entry.getElementsByTagName("title")[0]?.textContent || "";
                const link =
                    entry.getElementsByTagName("link")[0]?.getAttribute("href");
                if (title.includes("台風") &&
                    title.includes("予報") &&
                    link &&
                    !seenLinks.has(link)) {
                    seenLinks.add(link);
                    typhoonEntries.push(entry);
                }
            }
        }

        if (typhoonEntries.length === 0) {

            result.innerHTML =
                `<div class="result">【台風情報】
現在、台風情報はありません</div>`;

            status.textContent =
                "最終更新: " +
                new Date().toLocaleString("ja-JP");

            return;
        }

        const details =
            await Promise.all(
                typhoonEntries.map(async entry => {

                    const link =
                        entry
                        .getElementsByTagName("link")[0]
                        .getAttribute("href");

                    const detailRes =
                        await fetch(link);

                    const detailText =
                        await detailRes.text();

                    const detailXml =
                        parser.parseFromString(detailText, "text/xml");

                    let number = "";
                    let name = "不明";
                    let size = "--";
                    let intensity = "--";
                    let pressure = "不明";
                    let wind = "―";
                    let gust = "―";
                    let direction = "不明";
                    let speedText = "不明";
                    let area = "不明";
                    let latitude = 0;
                    let longitude = 0;

                    const numberNode =
                        detailXml.querySelector("Number");

                    if (numberNode) {
                        const raw = numberNode.textContent;
                        number = parseInt(raw.slice(-2), 10);
                    }

                    const nameNode =
                        detailXml.querySelector("Name");

                    if (nameNode) {
                        name = nameNode.textContent;
                    }

                    const info =
                        detailXml.querySelector("MeteorologicalInfo");

                    if (info) {

                        const areaClass =
                            info.querySelector("AreaClass");

                        if (areaClass?.textContent) {
                            size = areaClass.textContent;
                        }

                        const intensityClass =
                            info.querySelector("IntensityClass");

                        if (intensityClass?.textContent) {
                            intensity = intensityClass.textContent;
                        }

                        const location =
                            info.querySelector("CenterPart Location");

                        if (location?.textContent) {
                            area = location.textContent;
                        }

                        const pressureNode =
                            info.querySelector("Pressure");

                        if (pressureNode?.textContent) {
                            pressure = pressureNode.textContent;
                        }

                        const directionNode =
                            info.querySelector("Direction");

                        if (directionNode?.textContent) {
                            direction = directionNode.textContent;
                        }

                        const speedNode =
                            [...info.querySelectorAll("Speed")]
                            .find(x =>
                                x.getAttribute("unit") === "km/h"
                            );

                        if (speedNode) {

                            const speed =
                                speedNode.textContent;

                            const desc =
                                speedNode.getAttribute("description");

                            if (desc?.includes("ゆっくり")) {
                                speedText = "ゆっくり";
                            } else if (
                                desc?.includes("ほとんど停滞")
                            ) {
                                speedText = "ほとんど停滞";
                            } else {
                                speedText = speed + " km/h";
                            }
                        }

                        const windNodes =
                            [...info.querySelectorAll("WindSpeed")];

                        windNodes.forEach(node => {

                            const unit =
                                node.getAttribute("unit");

                            const type =
                                node.getAttribute("type") || "";

                            if (
                                unit === "m/s" &&
                                (!type || type.includes("最大風速"))
                            ) {
                                wind = node.textContent;
                            }

                            if (
                                unit === "m/s" &&
                                type.includes("最大瞬間風速")
                            ) {
                                gust = node.textContent;
                            }
                        });

                        // 緯度経度を取得
                        const centerPart =
                            info.querySelector("CenterPart");
                        if (centerPart) {
                            const latNode =
                                centerPart.querySelector("Latitude");
                            const lonNode =
                                centerPart.querySelector("Longitude");
                            if (latNode?.textContent) {
                                latitude = parseFloat(latNode.textContent);
                            }
                            if (lonNode?.textContent) {
                                longitude = parseFloat(lonNode.textContent);
                            }
                        }
                    }

                    return {
                        number,
                        name,
                        size,
                        intensity,
                        pressure,
                        wind,
                        gust,
                        direction,
                        speedText,
                        area,
                        latitude,
                        longitude
                    };
                })
            );

        result.innerHTML =
            details.map((t, i) => {

                const text =
`【台風情報】
台風${t.number}号
台風名　${t.name}
大きさ　${t.size}
強さ　${t.intensity}
存在地域　${t.area}
中心気圧　${t.pressure} hPa
最大風速　${t.wind} m/s
最大瞬間風速　${t.gust} m/s
移動方向　${t.direction}
移動速度　${t.speedText}`;

                const escaped =
                    text.replace(/&/g, "&amp;")
                        .replace(/</g, "&lt;")
                        .replace(/>/g, "&gt;");

                return `
<div class="typhoon-item">
    <div class="image-container">
        <canvas id="typhoon-map-${i}"></canvas>
        <div class="image-buttons">
            <button class="downloadBtn" onclick="downloadImage(${i}, '台風${t.number}号_${t.name}')">⬇️ 画像ダウンロード</button>
            <button class="shareBtn" onclick="shareImage(${i})">📤 シェア</button>
        </div>
    </div>
    <div class="copy-wrap">
        <button class="copyBtn" onclick="copyInfo(${i})">📋 コピー</button>
    </div>
    <div class="result" id="typhoon-${i}">${escaped}</div>
</div>`;
            }).join("");

        // テキストを保存
        window.typhoonTexts =
            details.map(t =>
`【台風情報】
台風${t.number}号
台風名　${t.name}
大きさ　${t.size}
強さ　${t.intensity}
存在地域　${t.area}
中心気圧　${t.pressure} hPa
最大風速　${t.wind} m/s
最大瞬間風速　${t.gust} m/s
移動方向　${t.direction}
移動速度　${t.speedText}`
            );

        window.typhoonData = details;

        // 画像を生成
        details.forEach((t, i) => {
            setTimeout(() => {
                drawTyphoonMap(i, t);
            }, 100);
        });

        status.textContent =
            "最終更新: " +
            new Date().toLocaleString("ja-JP");

    } catch(error) {

        console.error(error);

        result.innerHTML =
            `<div class="result">データ取得に失敗しました

GitHub Pagesでは
気象庁XMLのCORS制限により
取得できない場合があります。</div>`;

        status.textContent = "取得失敗";
    }
}

function drawTyphoonMap(index, typhoonData) {
    const canvas = document.getElementById(`typhoon-map-${index}`);
    if (!canvas) return;

    const width = 800;
    const height = 600;
    canvas.width = width;
    canvas.height = height;

    const ctx = canvas.getContext('2d');

    // 背景（空）
    ctx.fillStyle = '#e8f4f8';
    ctx.fillRect(0, 0, width, height);

    // グリッド線
    ctx.strokeStyle = '#d0d0d0';
    ctx.lineWidth = 1;
    ctx.setLineDash([2, 2]);

    for (let lon = 120; lon <= 150; lon += 5) {
        const x = lonToX(lon, width);
        ctx.beginPath();
        ctx.moveTo(x, 0);
        ctx.lineTo(x, height);
        ctx.stroke();
    }

    for (let lat = 20; lat <= 50; lat += 5) {
        const y = latToY(lat, height);
        ctx.beginPath();
        ctx.moveTo(0, y);
        ctx.lineTo(width, y);
        ctx.stroke();
    }

    ctx.setLineDash([]);

    // 経緯度ラベル
    ctx.fillStyle = '#666';
    ctx.font = '11px sans-serif';
    ctx.textAlign = 'center';

    for (let lon = 120; lon <= 150; lon += 10) {
        const x = lonToX(lon, width);
        ctx.fillText(lon + '°', x, height - 5);
    }

    ctx.textAlign = 'right';
    for (let lat = 30; lat <= 50; lat += 5) {
        const y = latToY(lat, height);
        ctx.fillText(lat + '°', 25, y + 4);
    }

    // 日本列島を描画
    drawJapan(ctx, width, height);

    // 台風情報
    const centerX = lonToX(typhoonData.longitude, width);
    const centerY = latToY(typhoonData.latitude, height);

    // 風域（円形）
    ctx.fillStyle = 'rgba(255, 165, 0, 0.15)';
    ctx.beginPath();
    ctx.arc(centerX, centerY, 70, 0, Math.PI * 2);
    ctx.fill();

    ctx.strokeStyle = 'rgba(255, 165, 0, 0.4)';
    ctx.lineWidth = 2;
    ctx.stroke();

    // 台風の中心（赤い点）
    ctx.fillStyle = '#ff0000';
    ctx.beginPath();
    ctx.arc(centerX, centerY, 10, 0, Math.PI * 2);
    ctx.fill();

    ctx.strokeStyle = '#ffffff';
    ctx.lineWidth = 2;
    ctx.stroke();

    // 中心に×マーク
    ctx.strokeStyle = '#ffffff';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(centerX - 8, centerY - 8);
    ctx.lineTo(centerX + 8, centerY + 8);
    ctx.moveTo(centerX + 8, centerY - 8);
    ctx.lineTo(centerX - 8, centerY + 8);
    ctx.stroke();

    // 情報ボックス
    ctx.fillStyle = 'rgba(255, 255, 255, 0.95)';
    ctx.fillRect(10, 10, 280, 110);
    ctx.strokeStyle = '#333';
    ctx.lineWidth = 1;
    ctx.strokeRect(10, 10, 280, 110);

    ctx.fillStyle = '#000';
    ctx.font = 'bold 16px sans-serif';
    ctx.textAlign = 'left';
    ctx.fillText(`台風${typhoonData.number}号 ${typhoonData.name}`, 20, 30);

    ctx.font = '12px sans-serif';
    ctx.fillStyle = '#333';
    ctx.fillText(`位置: 北緯${Math.abs(typhoonData.latitude).toFixed(1)}° 東経${typhoonData.longitude.toFixed(1)}°`, 20, 50);
    ctx.fillText(`気圧: ${typhoonData.pressure} hPa`, 20, 65);
    ctx.fillText(`最大風速: ${typhoonData.wind} m/s`, 20, 80);
    ctx.fillText(`移動: ${typhoonData.direction} ${typhoonData.speedText}`, 20, 95);
    ctx.fillText(`強さ: ${typhoonData.intensity}　大きさ: ${typhoonData.size}`, 20, 110);

    // 凡例
    ctx.fillStyle = 'rgba(255, 255, 255, 0.95)';
    ctx.fillRect(width - 220, height - 100, 210, 90);
    ctx.strokeStyle = '#333';
    ctx.lineWidth = 1;
    ctx.strokeRect(width - 220, height - 100, 210, 90);

    ctx.font = 'bold 12px sans-serif';
    ctx.fillStyle = '#000';
    ctx.textAlign = 'left';
    ctx.fillText('凡例', width - 210, height - 82);

    ctx.fillStyle = '#ff0000';
    ctx.beginPath();
    ctx.arc(width - 195, height - 65, 5, 0, Math.PI * 2);
    ctx.fill();

    ctx.font = '11px sans-serif';
    ctx.fillStyle = '#333';
    ctx.textAlign = 'left';
    ctx.fillText('台風中心', width - 185, height - 62);

    ctx.fillStyle = 'rgba(255, 165, 0, 0.3)';
    ctx.fillRect(width - 195, height - 48, 12, 12);
    ctx.strokeStyle = 'rgba(255, 165, 0, 0.6)';
    ctx.lineWidth = 1;
    ctx.strokeRect(width - 195, height - 48, 12, 12);

    ctx.fillStyle = '#333';
    ctx.fillText('風域', width - 178, height - 40);

    ctx.fillStyle = '#90EE90';
    ctx.fillRect(width - 195, height - 25, 12, 12);
    ctx.strokeStyle = '#333';
    ctx.lineWidth = 0.5;
    ctx.strokeRect(width - 195, height - 25, 12, 12);

    ctx.fillStyle = '#333';
    ctx.fillText('日本', width - 178, height - 17);
}

function drawJapan(ctx, width, height) {
    // 本州の簡易描画
    const honshu = [
        [131, 45], [145, 45], [145, 40], [140, 36], [135, 36], [130, 38], [128, 40]
    ];

    ctx.fillStyle = '#90EE90';
    ctx.strokeStyle = '#333';
    ctx.lineWidth = 1.5;

    ctx.beginPath();
    ctx.moveTo(lonToX(honshu[0][0], width), latToY(honshu[0][1], height));
    for (let i = 1; i < honshu.length; i++) {
        ctx.lineTo(lonToX(honshu[i][0], width), latToY(honshu[i][1], height));
    }
    ctx.closePath();
    ctx.fill();
    ctx.stroke();

    // 北海道
    const hokkaido = [
        [140, 45.5], [145, 45], [145, 43], [138, 43]
    ];

    ctx.beginPath();
    ctx.moveTo(lonToX(hokkaido[0][0], width), latToY(hokkaido[0][1], height));
    for (let i = 1; i < hokkaido.length; i++) {
        ctx.lineTo(lonToX(hokkaido[i][0], width), latToY(hokkaido[i][1], height));
    }
    ctx.closePath();
    ctx.fill();
    ctx.stroke();

    // 九州
    const kyushu = [
        [130, 36], [135, 36], [135, 33], [130, 33]
    ];

    ctx.beginPath();
    ctx.moveTo(lonToX(kyushu[0][0], width), latToY(kyushu[0][1], height));
    for (let i = 1; i < kyushu.length; i++) {
        ctx.lineTo(lonToX(kyushu[i][0], width), latToY(kyushu[i][1], height));
    }
    ctx.closePath();
    ctx.fill();
    ctx.stroke();
}

function lonToX(lon, width) {
    // 経度: 120-150を0-widthにマッピング
    return ((lon - 120) / (150 - 120)) * width;
}

function latToY(lat, height) {
    // 緯度: 50-20を0-heightにマッピング（上が高緯度）
    return ((50 - lat) / (50 - 20)) * height;
}

async function copyInfo(index) {
    const text = window.typhoonTexts[index];

    try {
        await navigator.clipboard.writeText(text);

        const status = document.getElementById("status");
        status.textContent = "✅ コピーしました";

        setTimeout(() => {
            status.textContent = "最終更新: " + new Date().toLocaleString("ja-JP");
        }, 2000);
    } catch {
        alert("コピーに失敗しました");
    }
}

function downloadImage(index, filename) {
    const canvas = document.getElementById(`typhoon-map-${index}`);
    if (!canvas) return;

    const link = document.createElement('a');
    link.href = canvas.toDataURL('image/png');
    link.download = `${filename}_${new Date().toISOString().split('T')[0]}.png`;
    link.click();
}

async function shareImage(index) {
    const canvas = document.getElementById(`typhoon-map-${index}`);
    if (!canvas) return;

    const typhoonData = window.typhoonData[index];

    canvas.toBlob(async (blob) => {
        const shareData = {
            title: `台風${typhoonData.number}号 ${typhoonData.name}`,
            text: `【台風情報】台風${typhoonData.number}号 ${typhoonData.name}\n気圧: ${typhoonData.pressure} hPa`,
            files: [
                new File([blob], `typhoon-${typhoonData.number}.png`, { type: 'image/png' })
            ]
        };

        try {
            if (navigator.share && navigator.canShare(shareData)) {
                await navigator.share(shareData);
            } else {
                alert('このブラウザではシェア機能が利用できません');
            }
        } catch(error) {
            console.log('シェアがキャンセルされました');
        }
    });
}

getTyphoonInfo();

</script>

</body>
</html>
