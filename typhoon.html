<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>台風情報</title>
<style>
body{ font-family:sans-serif; max-width:900px; margin:40px auto; padding:20px; background:#f5f5f5; }
.card{ background:white; border:1px solid #ccc; border-radius:10px; padding:20px; margin-bottom:20px; box-shadow:0 2px 5px rgba(0,0,0,0.1); }
#status{ text-align:center; margin-bottom:10px; color:green; font-size:14px; }
.btn-row{ display:flex; justify-content:center; gap:10px; margin-bottom:20px; }
button{ padding:10px 18px; font-size:16px; border:none; border-radius:8px; cursor:pointer; background:#0066cc; color:white; }
button:hover{ opacity:0.85; }
.copy-btn{ background:#28a745; margin-top:10px; }
pre{ white-space:pre-line; margin:0; line-height:1.8; }
</style>
</head>
<body>

<h1>台風情報</h1>
<div class="btn-row">
    <button onclick="getTyphoonInfo()">🔄 最新情報を更新</button>
</div>
<div id="status"></div>
<div id="result-list">読み込み待機中...</div>

<script>
async function getTyphoonInfo() {
    const FEED_URL = "https://www.data.jma.go.jp/developer/xml/feed/extra.xml";
    const container = document.getElementById("result-list");
    const status = document.getElementById("status");

    try {
        container.innerHTML = "取得中...";
        const feedRes = await fetch(FEED_URL);
        const feedText = await feedRes.text();
        const parser = new DOMParser();
        const feedXml = parser.parseFromString(feedText, "text/xml");
        const entries = [...feedXml.getElementsByTagName("entry")];

        // 実況と予報を合わせて最大3件取得
        const targets = entries.filter(e => e.getElementsByTagName("title")[0].textContent.includes("台風"))
                               .slice(0, 3);

        if (targets.length === 0) {
            container.innerHTML = "<div class='card'>現在、台風情報はありません。</div>";
            return;
        }

        container.innerHTML = "";
        for (const entry of targets) {
            const link = entry.getElementsByTagName("link")[0].getAttribute("href");
            const detailRes = await fetch(link);
            const detailXml = parser.parseFromString(await detailRes.text(), "text/xml");
            
            // データ解析（元のロジックを流用）
            const info = detailXml.querySelector("MeteorologicalInfo");
            const number = parseInt(detailXml.querySelector("Number")?.textContent.slice(-2), 10) || "不明";
            const name = detailXml.querySelector("Name")?.textContent || "不明";
            const area = info?.querySelector("CenterPart Location")?.textContent || "不明";
            const pressure = info?.querySelector("Pressure")?.textContent || "不明";
            
            const typhoonText = `【台風情報】
台風${number}号
台風名　${name}
存在地域　${area}
中心気圧　${pressure} hPa`;

            const card = document.createElement("div");
            card.className = "card";
            card.innerHTML = `<pre>${typhoonText}</pre>
                              <button class="copy-btn" onclick="copyInfo(this)">📋 この件をコピー</button>`;
            container.appendChild(card);
        }
        status.textContent = "最終更新: " + new Date().toLocaleString("ja-JP");
    } catch(e) {
        container.textContent = "データ取得に失敗しました。";
    }
}

async function copyInfo(btn) {
    const text = btn.previousElementSibling.textContent;
    await navigator.clipboard.writeText(text);
    const originalText = btn.textContent;
    btn.textContent = "✅ コピーしました";
    setTimeout(() => btn.textContent = originalText, 2000);
}

getTyphoonInfo();
</script>
</body>
</html>
