<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>台風情報</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<style>
body{
    font-family:sans-serif;
    max-width:1200px;
    margin:40px auto;
    padding:20px;
    background:#f5f5f5;
}

#backBtn{
    display:inline-block;
    margin-bottom:15px;
    padding:10px 16px;
    background:#0066cc;
    color:white;
    text-decoration:none;
    border-radius:8px;
    font-size:14px;
    font-weight:bold;
}

#backBtn:hover{
    background:#0055aa;
}

h1{
    text-align:center;
    margin-top:0;
}

.buttons{
    display:flex;
    justify-content:center;
    gap:10px;
    margin-bottom:15px;
}

button{
    padding:10px 18px;
    font-size:16px;
    border:none;
    border-radius:8px;
    cursor:pointer;
}

button:hover{
    opacity:0.85;
}

.copyBtn, .downloadBtn, .openBtn, .screenshotBtn{
    padding:8px 14px;
    font-size:14px;
}

#status{
    text-align:center;
    margin-bottom:10px;
    color:green;
    font-size:14px;
}

.typhoon-item{
    margin-bottom:30px;
    border:2px solid #ddd;
    border-radius:10px;
    overflow:hidden;
}

.typhoon-header{
    background:#0066cc;
    color:white;
    padding:15px;
    font-size:18px;
    font-weight:bold;
}

.typhoon-content{
    padding:20px;
}

.map-section{
    background:white;
    border:1px solid #ccc;
    border-radius:10px;
    padding:0;
    margin-bottom:15px;
    overflow:hidden;
    box-shadow:0 2px 5px rgba(0,0,0,0.1);
    position:relative;
}

.map-section iframe{
    width:100%;
    height:600px;
    border:none;
    display:block;
}

.map-fallback{
    width:100%;
    height:600px;
    background:#f0f0f0;
    display:flex;
    align-items:center;
    justify-content:center;
    flex-direction:column;
    color:#666;
    padding:20px;
    box-sizing:border-box;
    text-align:center;
}

.button-group{
    display:flex;
    gap:8px;
    justify-content:center;
    flex-wrap:wrap;
    margin-bottom:10px;
}

.downloadBtn{
    background:#28a745;
    color:white;
}

.downloadBtn:hover{
    opacity:0.85;
}

.copyBtn{
    background:#17a2b8;
    color:white;
}

.copyBtn:hover{
    opacity:0.85;
}

.openBtn{
    background:#ffc107;
    color:#333;
}

.openBtn:hover{
    opacity:0.85;
}

.screenshotBtn{
    background:#6f42c1;
    color:white;
}

.screenshotBtn:hover{
    opacity:0.85;
}

.info-section{
    white-space:pre-line;
    background:#f9f9f9;
    border:1px solid #ccc;
    border-radius:10px;
    padding:15px;
    line-height:1.8;
    font-size:14px;
}

.jma-link{
    text-align:center;
    font-size:12px;
    color:#666;
    margin-top:10px;
}

.jma-link a{
    color:#0066cc;
    text-decoration:none;
}

.jma-link a:hover{
    text-decoration:underline;
}

.image-error{
    padding:20px;
    color:#d9534f;
    font-size:14px;
    background:#f2dede;
    border-radius:6px;
}

.screenshot-loading{
    text-align:center;
    padding:10px;
    color:#666;
}

#screenshot-canvas{
    display:none;
}
</style>
</head>
<body>

<a href="index.html" id="backBtn">
← トップへ戻る
</a>

<h1>台風情報</h1>

<div class="buttons">
    <button onclick="getTyphoonInfo()">🔄 更新</button>
</div>

<div id="status"></div>

<div id="result">読み込み待機中...</div>

<canvas id="screenshot-canvas"></canvas>

<script>

async function getTyphoonInfo() {

    const FEED_URL =
        "https://www.data.jma.go.jp/developer/xml/feed/extra.xml";

    const result =
        document.getElementById("result");

    const status =
        document.getElementById("status");

    try {

        result.textContent = "取得中...";
        status.textContent = "";

        const feedRes =
            await fetch(FEED_URL);

        const feedText =
            await feedRes.text();

        const parser =
            new DOMParser();

        const feedXml =
            parser.parseFromString(feedText, "text/xml");

        const entries =
            [...feedXml.getElementsByTagName("entry")];

        const typhoonEntries = [];
        const seenLinks = new Set();

        // 第1パス: 実況
        for (const entry of entries) {
            if (typhoonEntries.length >= 3) break;
            const title =
                entry.getElementsByTagName("title")[0]?.textContent || "";
            const link =
                entry.getElementsByTagName("link")[0]?.getAttribute("href");
            if (title.includes("台風") &&
                title.includes("実況") &&
                link &&
                !seenLinks.has(link)) {
                seenLinks.add(link);
                typhoonEntries.push(entry);
            }
        }

        // 第2パス: 予報
        if (typhoonEntries.length < 3) {
            for (const entry of entries) {
                if (typhoonEntries.length >= 3) break;
                const title =
                    entry.getElementsByTagName("title")[0]?.textContent || "";
                const link =
                    entry.getElementsByTagName("link")[0]?.getAttribute("href");
                if (title.includes("台風") &&
                    title.includes("予報") &&
                    link &&
                    !seenLinks.has(link)) {
                    seenLinks.add(link);
                    typhoonEntries.push(entry);
                }
            }
        }

        if (typhoonEntries.length === 0) {

            result.innerHTML =
                `<div class="typhoon-item">
                    <div class="typhoon-header">台風情報</div>
                    <div class="typhoon-content">
                        <div class="info-section">現在、台風情報はありません</div>
                    </div>
                </div>`;

            status.textContent =
                "最終更新: " +
                new Date().toLocaleString("ja-JP");

            return;
        }

        const details =
            await Promise.all(
                typhoonEntries.map(async entry => {

                    const link =
                        entry
                        .getElementsByTagName("link")[0]
                        .getAttribute("href");

                    const detailRes =
                        await fetch(link);

                    const detailText =
                        await detailRes.text();

                    const detailXml =
                        parser.parseFromString(detailText, "text/xml");

                    let number = "";
                    let name = "不明";
                    let size = "--";
                    let intensity = "--";
                    let pressure = "不明";
                    let wind = "―";
                    let gust = "―";
                    let direction = "不明";
                    let speedText = "不明";
                    let area = "不明";

                    const numberNode =
                        detailXml.querySelector("Number");

                    if (numberNode) {
                        const raw = numberNode.textContent;
                        number = parseInt(raw.slice(-2), 10);
                    }

                    const nameNode =
                        detailXml.querySelector("Name");

                    if (nameNode) {
                        name = nameNode.textContent;
                    }

                    const info =
                        detailXml.querySelector("MeteorologicalInfo");

                    if (info) {

                        const areaClass =
                            info.querySelector("AreaClass");

                        if (areaClass?.textContent) {
                            size = areaClass.textContent;
                        }

                        const intensityClass =
                            info.querySelector("IntensityClass");

                        if (intensityClass?.textContent) {
                            intensity = intensityClass.textContent;
                        }

                        const location =
                            info.querySelector("CenterPart Location");

                        if (location?.textContent) {
                            area = location.textContent;
                        }

                        const pressureNode =
                            info.querySelector("Pressure");

                        if (pressureNode?.textContent) {
                            pressure = pressureNode.textContent;
                        }

                        const directionNode =
                            info.querySelector("Direction");

                        if (directionNode?.textContent) {
                            direction = directionNode.textContent;
                        }

                        const speedNode =
                            [...info.querySelectorAll("Speed")]
                            .find(x =>
                                x.getAttribute("unit") === "km/h"
                            );

                        if (speedNode) {

                            const speed =
                                speedNode.textContent;

                            const desc =
                                speedNode.getAttribute("description");

                            if (desc?.includes("ゆっくり")) {
                                speedText = "ゆっくり";
                            } else if (
                                desc?.includes("ほとんど停滞")
                            ) {
                                speedText = "ほとんど停滞";
                            } else {
                                speedText = speed + " km/h";
                            }
                        }

                        const windNodes =
                            [...info.querySelectorAll("WindSpeed")];

                        windNodes.forEach(node => {

                            const unit =
                                node.getAttribute("unit");

                            const type =
                                node.getAttribute("type") || "";

                            if (
                                unit === "m/s" &&
                                (!type || type.includes("最大風速"))
                            ) {
                                wind = node.textContent;
                            }

                            if (
                                unit === "m/s" &&
                                type.includes("最大瞬間風速")
                            ) {
                                gust = node.textContent;
                            }
                        });
                    }

                    return {
                        number,
                        name,
                        size,
                        intensity,
                        pressure,
                        wind,
                        gust,
                        direction,
                        speedText,
                        area
                    };
                })
            );

        result.innerHTML =
            details.map((t, i) => {

                const text =
`【台風情報】
台風${t.number}号
台風名　${t.name}
大きさ　${t.size}
強さ　${t.intensity}
存在地域　${t.area}
中心気圧　${t.pressure} hPa
最大風速　${t.wind} m/s
最大瞬間風速　${t.gust} m/s
移動方向　${t.direction}
移動速度　${t.speedText}`;

                // 台風号のみを表示するURL
                const mapUrl = `https://www.jma.go.jp/bosai/map.html#4/30.364/139.073/&elem=root&typhoon=${String(t.number).padStart(2, '0')}&contents=typhoon`;

                return `
<div class="typhoon-item" id="typhoon-item-${i}">
    <div class="typhoon-header">台風${t.number}号 ${t.name}</div>
    
    <div class="typhoon-content">
        <div class="map-section" id="map-section-${i}">
            <div class="map-fallback">
                <p>気象庁マップを読み込み中...</p>
                <p style="font-size:12px; margin-top:10px;">
                    アクセスできない場合は、下のボタンから気象庁ページにアクセスしてください
                </p>
            </div>
            <iframe 
                src="${mapUrl}" 
                title="台風${t.number}号進路図"
                onload="removeMapFallback(${i})"
                onerror="showMapError(${i})"
                sandbox="allow-scripts allow-same-origin"
                style="display:none;">
            </iframe>
        </div>

        <div class="button-group">
            <button class="screenshotBtn" onclick="takeScreenshot(${i}, '台風${t.number}号_${t.name}')">📸 この画面をスクショ</button>
            <button class="openBtn" onclick="openJMAPageForTyphoon(${t.number})">🔗 気象庁で詳細を見る</button>
        </div>

        <div class="info-section">${text}</div>
        
        <div class="button-group" style="margin-top:10px;">
            <button class="copyBtn" onclick="copyInfo(${i})">📋 情報をコピー</button>
        </div>

        <div class="jma-link">
            <a href="https://www.jma.go.jp/bosai/typhoon/" target="_blank">
                気象庁 台風情報ページ →
            </a>
        </div>
    </div>
</div>`;
            }).join("");

        // テキストを保存
        window.typhoonTexts =
            details.map(t =>
`【台風情報】
台風${t.number}号
台風名　${t.name}
大きさ　${t.size}
強さ　${t.intensity}
存在地域　${t.area}
中心気圧　${t.pressure} hPa
最大風速　${t.wind} m/s
最大瞬間風速　${t.gust} m/s
移動方向　${t.direction}
移動速度　${t.speedText}`
            );

        window.typhoonData = details;

        status.textContent =
            "最終更新: " +
            new Date().toLocaleString("ja-JP");

    } catch(error) {

        console.error(error);

        result.innerHTML =
            `<div class="typhoon-item">
                <div class="typhoon-header">エラー</div>
                <div class="typhoon-content">
                    <div class="image-error">データ取得に失敗しました。
                    
GitHub Pagesでは気象庁XMLのCORS制限により取得できない場合があります。</div>
                </div>
            </div>`;

        status.textContent = "取得失敗";
    }
}

function removeMapFallback(index) {
    const mapSection = document.getElementById(`map-section-${index}`);
    if (mapSection) {
        const fallback = mapSection.querySelector('.map-fallback');
        if (fallback) {
            fallback.remove();
        }
        const iframe = mapSection.querySelector('iframe');
        if (iframe) {
            iframe.style.display = 'block';
        }
    }
}

function showMapError(index) {
    const mapSection = document.getElementById(`map-section-${index}`);
    if (mapSection) {
        const fallback = mapSection.querySelector('.map-fallback');
        if (fallback) {
            fallback.innerHTML = `
                <p>⚠️ マップの読み込みに失敗しました</p>
                <p style="font-size:12px; margin-top:10px;">
                    このブラウザやネットワークではアクセスできません。<br>
                    下のボタンから気象庁ページにアクセスするか、<br>
                    「この画面をスクショ」でマップを画像として保存できます。
                </p>
            `;
        }
    }
}

async function takeScreenshot(index, filename) {
    const status = document.getElementById("status");
    const typhoonItem = document.getElementById(`typhoon-item-${index}`);
    
    if (!typhoonItem) {
        alert("要素が見つかりません");
        return;
    }

    status.textContent = "スクショを作成中...";

    try {
        const canvas = await html2canvas(typhoonItem, {
            backgroundColor: '#ffffff',
            useCORS: true,
            allowTaint: true,
            scale: 2
        });

        // ダウンロード
        const link = document.createElement('a');
        link.href = canvas.toDataURL('image/png');
        link.download = `${filename}_${new Date().toISOString().split('T')[0]}.png`;
        link.click();

        status.textContent = "✅ スクショをダウンロードしました";

        setTimeout(() => {
            status.textContent = "最終更新: " + new Date().toLocaleString("ja-JP");
        }, 2000);

    } catch(error) {
        console.error('スクショエラー:', error);
        status.textContent = "❌ スクショに失敗しました";
        alert("スクショの作成に失敗しました。もう一度試してください。");
    }
}

async function copyInfo(index) {

    const text =
        window.typhoonTexts[index];

    try {

        await navigator.clipboard.writeText(text);

        const status =
            document.getElementById("status");

        status.textContent =
            "✅ 情報をコピーしました";

        setTimeout(() => {

            status.textContent =
                "最終更新: " +
                new Date().toLocaleString("ja-JP");

        }, 2000);

    } catch {

        alert("コピーに失敗しました");
    }
}

function openJMAPageForTyphoon(typhoonNumber) {
    const mapUrl = `https://www.jma.go.jp/bosai/map.html#4/30.364/139.073/&elem=root&typhoon=${String(typhoonNumber).padStart(2, '0')}&contents=typhoon`;
    window.open(mapUrl, '_blank');
}

getTyphoonInfo();

</script>

</body>
</html>
