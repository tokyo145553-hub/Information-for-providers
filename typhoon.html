<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>台風情報</title>

<style>
body{
    font-family:sans-serif;
    max-width:900px;
    margin:40px auto;
    padding:20px;
    background:#f5f5f5;
}

#backBtn{
    display:inline-block;
    margin-bottom:15px;
    padding:10px 16px;
    background:#0066cc;
    color:white;
    text-decoration:none;
    border-radius:8px;
    font-size:14px;
    font-weight:bold;
}

#backBtn:hover{
    background:#0055aa;
}

h1{
    text-align:center;
    margin-top:0;
}

.buttons{
    display:flex;
    justify-content:center;
    gap:10px;
    margin-bottom:15px;
}

button{
    padding:10px 18px;
    font-size:16px;
    border:none;
    border-radius:8px;
    cursor:pointer;
}

button:hover{
    opacity:0.85;
}

.copyBtn{
    padding:6px 14px;
    font-size:14px;
}

#status{
    text-align:center;
    margin-bottom:10px;
    color:green;
    font-size:14px;
}

.typhoon-item{
    margin-bottom:30px;
}

.copy-wrap{
    display:flex;
    justify-content:flex-end;
    gap:8px;
    margin-bottom:6px;
}

.result{
    white-space:pre-line;
    background:white;
    border:1px solid #ccc;
    border-radius:10px;
    padding:20px;
    line-height:1.8;
    box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

.image-container{
    background:white;
    border:1px solid #ccc;
    border-radius:10px;
    padding:20px;
    margin-bottom:15px;
    box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

.image-container canvas{
    max-width:100%;
    height:auto;
    display:block;
    margin-bottom:10px;
}

.image-buttons{
    display:flex;
    gap:8px;
}

.downloadBtn, .shareBtn{
    padding:8px 14px;
    font-size:14px;
    background:#28a745;
    color:white;
    border:none;
    border-radius:6px;
    cursor:pointer;
}

.downloadBtn:hover, .shareBtn:hover{
    opacity:0.85;
}
</style>
</head>
<body>

<a href="index.html" id="backBtn">
← トップへ戻る
</a>

<h1>台風情報</h1>

<div class="buttons">
    <button onclick="getTyphoonInfo()">🔄 更新</button>
</div>

<div id="status"></div>

<div id="result">読み込み待機中...</div>

<script>

async function getTyphoonInfo() {

    const FEED_URL =
        "https://www.data.jma.go.jp/developer/xml/feed/extra.xml";

    const result =
        document.getElementById("result");

    const status =
        document.getElementById("status");

    try {

        result.textContent = "取得中...";
        status.textContent = "";

        const feedRes =
            await fetch(FEED_URL);

        const feedText =
            await feedRes.text();

        const parser =
            new DOMParser();

        const feedXml =
            parser.parseFromString(feedText, "text/xml");

        const entries =
            [...feedXml.getElementsByTagName("entry")];

        const typhoonEntries = [];
        const seenLinks = new Set();

        // 第1パス: 実況
        for (const entry of entries) {
            if (typhoonEntries.length >= 3) break;
            const title =
                entry.getElementsByTagName("title")[0]?.textContent || "";
            const link =
                entry.getElementsByTagName("link")[0]?.getAttribute("href");
            if (title.includes("台風") &&
                title.includes("実況") &&
                link &&
                !seenLinks.has(link)) {
                seenLinks.add(link);
                typhoonEntries.push(entry);
            }
        }

        // 第2パス: 予報
        if (typhoonEntries.length < 3) {
            for (const entry of entries) {
                if (typhoonEntries.length >= 3) break;
                const title =
                    entry.getElementsByTagName("title")[0]?.textContent || "";
                const link =
                    entry.getElementsByTagName("link")[0]?.getAttribute("href");
                if (title.includes("台風") &&
                    title.includes("予報") &&
                    link &&
                    !seenLinks.has(link)) {
                    seenLinks.add(link);
                    typhoonEntries.push(entry);
                }
            }
        }

        if (typhoonEntries.length === 0) {

            result.innerHTML =
                `<div class="result">【台風情報】
現在、台風情報はありません</div>`;

            status.textContent =
                "最終更新: " +
                new Date().toLocaleString("ja-JP");

            return;
        }

        const details =
            await Promise.all(
                typhoonEntries.map(async entry => {

                    const link =
                        entry
                        .getElementsByTagName("link")[0]
                        .getAttribute("href");

                    const detailRes =
                        await fetch(link);

                    const detailText =
                        await detailRes.text();

                    const detailXml =
                        parser.parseFromString(detailText, "text/xml");

                    let number = "";
                    let name = "不明";
                    let size = "--";
                    let intensity = "--";
                    let pressure = "不明";
                    let wind = "―";
                    let gust = "―";
                    let direction = "不明";
                    let speedText = "不明";
                    let area = "不明";
                    let latitude = 0;
                    let longitude = 0;

                    const numberNode =
                        detailXml.querySelector("Number");

                    if (numberNode) {
                        const raw = numberNode.textContent;
                        number = parseInt(raw.slice(-2), 10);
                    }

                    const nameNode =
                        detailXml.querySelector("Name");

                    if (nameNode) {
                        name = nameNode.textContent;
                    }

                    const info =
                        detailXml.querySelector("MeteorologicalInfo");

                    if (info) {

                        const areaClass =
                            info.querySelector("AreaClass");

                        if (areaClass?.textContent) {
                            size = areaClass.textContent;
                        }

                        const intensityClass =
                            info.querySelector("IntensityClass");

                        if (intensityClass?.textContent) {
                            intensity = intensityClass.textContent;
                        }

                        const location =
                            info.querySelector("CenterPart Location");

                        if (location?.textContent) {
                            area = location.textContent;
                        }

                        const pressureNode =
                            info.querySelector("Pressure");

                        if (pressureNode?.textContent) {
                            pressure = pressureNode.textContent;
                        }

                        const directionNode =
                            info.querySelector("Direction");

                        if (directionNode?.textContent) {
                            direction = directionNode.textContent;
                        }

                        const speedNode =
                            [...info.querySelectorAll("Speed")]
                            .find(x =>
                                x.getAttribute("unit") === "km/h"
                            );

                        if (speedNode) {

                            const speed =
                                speedNode.textContent;

                            const desc =
                                speedNode.getAttribute("description");

                            if (desc?.includes("ゆっくり")) {
                                speedText = "ゆっくり";
                            } else if (
                                desc?.includes("ほとんど停滞")
                            ) {
                                speedText = "ほとんど停滞";
                            } else {
                                speedText = speed + " km/h";
                            }
                        }

                        const windNodes =
                            [...info.querySelectorAll("WindSpeed")];

                        windNodes.forEach(node => {

                            const unit =
                                node.getAttribute("unit");

                            const type =
                                node.getAttribute("type") || "";

                            if (
                                unit === "m/s" &&
                                (!type || type.includes("最大風速"))
                            ) {
                                wind = node.textContent;
                            }

                            if (
                                unit === "m/s" &&
                                type.includes("最大瞬間風速")
                            ) {
                                gust = node.textContent;
                            }
                        });

                        // 緯度経度を取得
                        const centerPart =
                            info.querySelector("CenterPart");
                        if (centerPart) {
                            const latNode =
                                centerPart.querySelector("Latitude");
                            const lonNode =
                                centerPart.querySelector("Longitude");
                            if (latNode?.textContent) {
                                latitude = parseFloat(latNode.textContent);
                            }
                            if (lonNode?.textContent) {
                                longitude = parseFloat(lonNode.textContent);
                            }
                        }
                    }

                    return {
                        number,
                        name,
                        size,
                        intensity,
                        pressure,
                        wind,
                        gust,
                        direction,
                        speedText,
                        area,
                        latitude,
                        longitude
                    };
                })
            );

        result.innerHTML =
            details.map((t, i) => {

                const text =
`【台風情報】
台風${t.number}号
台風名　${t.name}
大きさ　${t.size}
強さ　${t.intensity}
存在地域　${t.area}
中心気圧　${t.pressure} hPa
最大風速　${t.wind} m/s
最大瞬間風速　${t.gust} m/s
移動方向　${t.direction}
移動速度　${t.speedText}`;

                const escaped =
                    text.replace(/&/g, "&amp;")
                        .replace(/</g, "&lt;")
                        .replace(/>/g, "&gt;");

                return `
<div class="typhoon-item">
    <div class="image-container">
        <canvas id="typhoon-map-${i}"></canvas>
        <div class="image-buttons">
            <button class="downloadBtn" onclick="downloadImage(${i}, '台風${t.number}号_${t.name}')">⬇️ 画像ダウンロード</button>
            <button class="shareBtn" onclick="shareImage(${i})">📤 シェア</button>
        </div>
    </div>
    <div class="copy-wrap">
        <button class="copyBtn" onclick="copyInfo(${i})">📋 コピー</button>
    </div>
    <div class="result" id="typhoon-${i}">${escaped}</div>
</div>`;
            }).join("");

        // テキストを保存
        window.typhoonTexts =
            details.map(t =>
`【台風情報】
台風${t.number}号
台風名　${t.name}
大きさ　${t.size}
強さ　${t.intensity}
存在地域　${t.area}
中心気圧　${t.pressure} hPa
最大風速　${t.wind} m/s
最大瞬間風速　${t.gust} m/s
移動方向　${t.direction}
移動速度　${t.speedText}`
            );

        window.typhoonData = details;

        // 画像を生成
        details.forEach((t, i) => {
            setTimeout(() => {
                drawTyphoonMap(i, t);
            }, 100);
        });

        status.textContent =
            "最終更新: " +
            new Date().toLocaleString("ja-JP");

    } catch(error) {

        console.error(error);

        result.innerHTML =
            `<div class="result">データ取得に失敗しました

GitHub Pagesでは
気象庁XMLのCORS制限により
取得できない場合があります。</div>`;

        status.textContent = "取得失敗";
    }
}

function drawTyphoonMap(index, typhoonData) {
    const canvas = document.getElementById(`typhoon-map-${index}`);
    if (!canvas) return;

    canvas.width = 600;
    canvas.height = 500;

    const ctx = canvas.getContext('2d');

    // 背景
    ctx.fillStyle = '#e6f2ff';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // グリッド
    ctx.strokeStyle = '#cccccc';
    ctx.lineWidth = 1;
    for (let i = 0; i <= 10; i++) {
        ctx.beginPath();
        ctx.moveTo((canvas.width / 10) * i, 0);
        ctx.lineTo((canvas.width / 10) * i, canvas.height);
        ctx.stroke();

        ctx.beginPath();
        ctx.moveTo(0, (canvas.height / 10) * i);
        ctx.lineTo(canvas.width, (canvas.height / 10) * i);
        ctx.stroke();
    }

    // 日本列島の簡易描画
    drawJapanOutline(ctx, canvas);

    // 台風の中心位置を計算（緯度経度をキャンバス座標に変換）
    const centerX = convertLonToX(typhoonData.longitude, canvas.width);
    const centerY = convertLatToY(typhoonData.latitude, canvas.height);

    // 台風の風域を円で表現
    ctx.fillStyle = 'rgba(255, 165, 0, 0.2)';
    ctx.beginPath();
    ctx.arc(centerX, centerY, 60, 0, Math.PI * 2);
    ctx.fill();

    ctx.strokeStyle = 'rgba(255, 165, 0, 0.5)';
    ctx.lineWidth = 2;
    ctx.stroke();

    // 台風の中心
    ctx.fillStyle = '#ff4444';
    ctx.beginPath();
    ctx.arc(centerX, centerY, 8, 0, Math.PI * 2);
    ctx.fill();

    // 中心にバツ印
    ctx.strokeStyle = '#ff4444';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(centerX - 10, centerY - 10);
    ctx.lineTo(centerX + 10, centerY + 10);
    ctx.moveTo(centerX + 10, centerY - 10);
    ctx.lineTo(centerX - 10, centerY + 10);
    ctx.stroke();

    // 情報を表示
    ctx.fillStyle = '#000000';
    ctx.font = 'bold 18px sans-serif';
    ctx.textAlign = 'left';
    ctx.fillText(`台風${typhoonData.number}号 ${typhoonData.name}`, 20, 30);

    ctx.font = '14px sans-serif';
    ctx.fillText(`位置: 北緯${Math.abs(typhoonData.latitude).toFixed(2)}°　東経${typhoonData.longitude.toFixed(2)}°`, 20, 55);
    ctx.fillText(`気圧: ${typhoonData.pressure} hPa　最大風速: ${typhoonData.wind} m/s`, 20, 75);
    ctx.fillText(`移動: ${typhoonData.direction} ${typhoonData.speedText}`, 20, 95);

    // 凡例
    ctx.fillStyle = 'white';
    ctx.fillRect(canvas.width - 180, canvas.height - 80, 170, 70);
    ctx.strokeStyle = '#999';
    ctx.lineWidth = 1;
    ctx.strokeRect(canvas.width - 180, canvas.height - 80, 170, 70);

    ctx.fillStyle = '#ff4444';
    ctx.beginPath();
    ctx.arc(canvas.width - 160, canvas.height - 60, 5, 0, Math.PI * 2);
    ctx.fill();

    ctx.fillStyle = '#000000';
    ctx.font = '12px sans-serif';
    ctx.textAlign = 'left';
    ctx.fillText('台風中心', canvas.width - 150, canvas.height - 55);

    ctx.fillStyle = 'rgba(255, 165, 0, 0.3)';
    ctx.fillRect(canvas.width - 160, canvas.height - 35, 15, 15);
    ctx.fillStyle = '#000000';
    ctx.fillText('風域', canvas.width - 140, canvas.height - 22);
}

function drawJapanOutline(ctx, canvas) {
    // 日本列島の簡易的なアウトラインを描画
    ctx.fillStyle = '#90EE90';
    ctx.strokeStyle = '#333333';
    ctx.lineWidth = 2;

    // 本州
    const honshu = [
        {lat: 45.5, lon: 142},
        {lat: 43, lon: 145},
        {lat: 40, lon: 142},
        {lat: 38, lon: 140},
        {lat: 37, lon: 138},
        {lat: 38, lon: 135},
        {lat: 40, lon: 132},
        {lat: 42, lon: 130},
        {lat: 44, lon: 131},
        {lat: 45, lon: 137}
    ];

    drawLandArea(ctx, canvas, honshu);

    // 北海道
    const hokkaido = [
        {lat: 45.5, lon: 140},
        {lat: 45.5, lon: 145},
        {lat: 43.5, lon: 145.5},
        {lat: 43, lon: 140.5}
    ];
    drawLandArea(ctx, canvas, hokkaido);

    // 九州
    const kyushu = [
        {lat: 37, lon: 132},
        {lat: 36, lon: 132},
        {lat: 35, lon: 135},
        {lat: 36, lon: 135}
    ];
    drawLandArea(ctx, canvas, kyushu);
}

function drawLandArea(ctx, canvas, coordinates) {
    if (coordinates.length === 0) return;

    ctx.beginPath();
    const firstPoint = coordinates[0];
    ctx.moveTo(convertLonToX(firstPoint.lon, canvas.width), convertLatToY(firstPoint.lat, canvas.height));

    for (let i = 1; i < coordinates.length; i++) {
        const point = coordinates[i];
        ctx.lineTo(convertLonToX(point.lon, canvas.width), convertLatToY(point.lat, canvas.height));
    }

    ctx.closePath();
    ctx.fill();
    ctx.stroke();
}

function convertLonToX(lon, canvasWidth) {
    // 経度: 125-145を0-canvasWidthにマッピング
    return ((lon - 125) / (145 - 125)) * canvasWidth;
}

function convertLatToY(lat, canvasHeight) {
    // 緯度: 50-30を0-canvasHeightにマッピング（上が高緯度）
    return ((50 - lat) / (50 - 30)) * canvasHeight;
}

async function copyInfo(index) {

    const text =
        window.typhoonTexts[index];

    try {

        await navigator.clipboard.writeText(text);

        const status =
            document.getElementById("status");

        status.textContent =
            "✅ コピーしました";

        setTimeout(() => {

            status.textContent =
                "最終更新: " +
                new Date().toLocaleString("ja-JP");

        }, 2000);

    } catch {

        alert("コピーに失敗しました");
    }
}

function downloadImage(index, filename) {
    const canvas = document.getElementById(`typhoon-map-${index}`);
    if (!canvas) return;

    const link = document.createElement('a');
    link.href = canvas.toDataURL('image/png');
    link.download = `${filename}_${new Date().toISOString().split('T')[0]}.png`;
    link.click();
}

async function shareImage(index) {
    const canvas = document.getElementById(`typhoon-map-${index}`);
    if (!canvas) return;

    const typhoonData = window.typhoonData[index];

    canvas.toBlob(async (blob) => {
        const shareData = {
            title: `台風${typhoonData.number}号 ${typhoonData.name}`,
            text: `【台風情報】台風${typhoonData.number}号 ${typhoonData.name}\n気圧: ${typhoonData.pressure} hPa\n位置: 北緯${Math.abs(typhoonData.latitude).toFixed(2)}°`,
            files: [
                new File([blob], `typhoon-${typhoonData.number}.png`, { type: 'image/png' })
            ]
        };

        try {
            if (navigator.share && navigator.canShare(shareData)) {
                await navigator.share(shareData);
            } else {
                alert('このブラウザではシェア機能が利用できません');
            }
        } catch(error) {
            console.log('シェアがキャンセルされました', error);
        }
    });
}

getTyphoonInfo();

</script>

</body>
</html>
