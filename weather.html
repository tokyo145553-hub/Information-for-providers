
<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>気象警報ビューアー</title>
<style>
body {
    font-family: sans-serif;
    max-width: 900px;
    margin: 40px auto;
    padding: 20px;
    background: #f5f5f5;
}

#backBtn {
    display: inline-block;
    margin-bottom: 15px;
    padding: 10px 16px;
    background: #0066cc;
    color: white;
    text-decoration: none;
    border-radius: 8px;
    font-size: 14px;
    font-weight: bold;
}

#backBtn:hover { background: #0055aa; }

h1 { text-align: center; margin-top: 0; }

.controls {
    text-align: center;
    background: white;
    padding: 20px;
    border-radius: 10px;
    box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    margin-bottom: 20px;
}

.controls select {
    padding: 10px;
    font-size: 16px;
    border-radius: 5px;
    width: 80%;
    margin-bottom: 15px;
}

.buttons { display: flex; justify-content: center; gap: 10px; margin-bottom: 15px; }

button {
    padding: 10px 18px;
    font-size: 16px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    background: #0066cc;
    color: white;
}

.radio-group { font-size: 14px; display: flex; justify-content: center; gap: 15px; }

#status { text-align: center; margin-bottom: 10px; color: #555; font-size: 14px; }

#eew {
    white-space: pre-wrap;
    background: white;
    border: 1px solid #ccc;
    border-radius: 10px;
    padding: 20px;
    line-height: 1.6;
    box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    font-family: "Yu Gothic", "Meiryo", sans-serif;
    font-size: 14px;
    margin: 0;
}
</style>
</head>
<body>

<a href="index.html" id="backBtn">← トップへ戻る</a>
<h1>気象警報ビューアー</h1>

<div class="controls">
    <select id="areaSelect">
        <option selected>全国</option>
        <optgroup label="北海道地方"><option>石狩・空知・後志地方</option><option>宗谷地方</option><option>上川・留萌地方</option><option>網走・北見・紋別地方</option><option>十勝地方</option><option>釧路・根室地方</option><option>胆振・日高地方</option><option>渡島・檜山地方</option></optgroup>
        <optgroup label="東北地方"><option>青森県</option><option>岩手県</option><option>宮城県</option><option>秋田県</option><option>山形県</option><option>福島県</option></optgroup>
        <optgroup label="関東甲信地方"><option>茨城県</option><option>栃木県</option><option>群馬県</option><option>埼玉県</option><option>千葉県</option><option>東京都</option><option>神奈川県</option><option>山梨県</option><option>長野県</option></optgroup>
        <optgroup label="東海地方"><option>岐阜県</option><option>静岡県</option><option>愛知県</option><option>三重県</option></optgroup>
        <optgroup label="北陸地方"><option>新潟県</option><option>富山県</option><option>石川県</option><option>福井県</option></optgroup>
        <optgroup label="近畿地方"><option>滋賀県</option><option>京都府</option><option>大阪府</option><option>兵庫県</option><option>奈良県</option><option>和歌山県</option></optgroup>
        <optgroup label="中国地方"><option>鳥取県</option><option>島根県</option><option>岡山県</option><option>広島県</option><option>山口県</option></optgroup>
        <optgroup label="四国地方"><option>徳島県</option><option>香川県</option><option>愛媛県</option><option>高知県</option></optgroup>
        <optgroup label="九州北部地方（山口県を含む）"><option>山口県</option><option>福岡県</option><option>佐賀県</option><option>長崎県</option><option>熊本県</option><option>大分県</option></optgroup>
        <optgroup label="九州南部・奄美地方"><option>宮崎県</option><option>鹿児島県（奄美地方を除く）</option><option>奄美地方（鹿児島県）</option></optgroup>
        <optgroup label="沖縄地方"><option>沖縄本島地方</option><option>大東島地方</option><option>宮古島地方</option><option>八重山地方</option></optgroup>
    </select>
    <div class="buttons">
        <button id="copyBtn">📋 本文をコピー</button>
    </div>
    <div class="radio-group">
        <label><input type="radio" name="mode" value="all"> 全情報</label>
        <label><input type="radio" name="mode" value="keihou" checked> 警報以上</label>
        <label><input type="radio" name="mode" value="kiken_keihou"> 危険警報以上</label>
    </div>
</div>

<div id="status">取得日時: ----/--/-- --:--:--</div>
<pre id="eew">読み込み中...</pre>

<script>
const JMA_BASE = "https://www.jma.go.jp/bosai";
const AREA_JSON_URL = `${JMA_BASE}/common/const/area.json`;
const WARNING_R8_BASE_URL = `${JMA_BASE}/warning/data/r8`;

const regionCodeByName = {
  "宗谷地方": "011000", "上川・留萌地方": "012000", "網走・北見・紋別地方": "013000", "十勝地方": "014030", "釧路・根室地方": "014100", "胆振・日高地方": "015000", "石狩・空知・後志地方": "016000", "渡島・檜山地方": "017000", "青森県": "020000", "岩手県": "030000", "宮城県": "040000", "秋田県": "050000", "山形県": "060000", "福島県": "070000", "茨城県": "080000", "栃木県": "090000", "群馬県": "100000", "埼玉県": "110000", "千葉県": "120000", "東京都": "130000", "神奈川県": "140000", "新潟県": "150000", "富山県": "160000", "石川県": "170000", "福井県": "180000", "山梨県": "190000", "長野県": "200000", "岐阜県": "210000", "静岡県": "220000", "愛知県": "230000", "三重県": "240000", "滋賀県": "250000", "京都府": "260000", "大阪府": "270000", "兵庫県": "280000", "奈良県": "290000", "和歌山県": "300000", "鳥取県": "310000", "島根県": "320000", "岡山県": "330000", "広島県": "340000", "山口県": "350000", "徳島県": "360000", "香川県": "370000", "愛媛県": "380000", "高知県": "390000", "福岡県": "400000", "佐賀県": "410000", "長崎県": "420000", "熊本県": "430000", "大分県": "440000", "宮崎県": "450000", "奄美地方（鹿児島県）": "460040", "鹿児島県（奄美地方を除く）": "460100", "沖縄本島地方": "471000", "大東島地方": "472000", "宮古島地方": "473000", "八重山地方": "474000"
};

let areaDataCache = null;
let latestUpdateId = 0;

function setNowTime() {
  const now = new Date();
  document.getElementById("status").textContent = `取得日時: ${now.toLocaleString("ja-JP")}`;
}

async function main(mode=2,taisho_chiiki="全国",statusFormat=false) {
  const updateId = ++latestUpdateId;
  try {
    const warnArea = {
      "00":{name:"解除",level:null}, "02":{name:"暴風雪警報",level:3}, "03":{name:"レベル3大雨警報",level:3}, "04":{name:"洪水警報",level:3}, "05":{name:"暴風警報",level:3}, "06":{name:"大雪警報",level:3}, "07":{name:"波浪警報",level:3}, "08":{name:"レベル3高潮警報",level:3}, "09":{name:"レベル3土砂災害警報",level:3}, "10":{name:"レベル2大雨注意報",level:2}, "12":{name:"大雪注意報",level:2}, "13":{name:"風雪注意報",level:2}, "14":{name:"雷注意報",level:2}, "15":{name:"強風注意報",level:2}, "16":{name:"波浪注意報",level:2}, "17":{name:"融雪注意報",level:2}, "18":{name:"洪水注意報",level:2}, "19":{name:"レベル2高潮注意報",level:2}, "20":{name:"濃霧注意報",level:2}, "21":{name:"乾燥注意報",level:2}, "22":{name:"なだれ注意報",level:2}, "23":{name:"低温注意報",level:2}, "24":{name:"霜注意報",level:2}, "25":{name:"着氷注意報",level:2}, "26":{name:"着雪注意報",level:2}, "27":{name:"その他の注意報",level:2}, "29":{name:"レベル2土砂災害注意報",level:2}, "32":{name:"暴風雪特別警報",level:5}, "33":{name:"レベル5大雨特別警報",level:5}, "35":{name:"暴風特別警報",level:5}, "36":{name:"大雪特別警報",level:5}, "37":{name:"波浪特別警報",level:5}, "38":{name:"レベル5高潮特別警報",level:5}, "39":{name:"レベル5土砂災害特別警報",level:5}, "42":{name:"未定・予約",level:null}, "43":{name:"レベル4大雨危険警報",level:4}, "45":{name:"未定・予約",level:null}, "46":{name:"未定・予約",level:null}, "47":{name:"未定・予約",level:null}, "48":{name:"レベル4高潮危険警報",level:4}, "49":{name:"レベル4土砂災害危険警報",level:4}
    };
    
    document.getElementById("eew").textContent = "読み込み中...";
    const {warnData,regionReportDT} = await getCityWarningsByArea(warnArea,taisho_chiiki);
    if (updateId !== latestUpdateId) return;
    const data = warnData;
    const dt = new Date(regionReportDT || data.reportDatetime || Date.now());
    const MM = String(dt.getMonth() + 1).padStart(2, '0');
    const dd = String(dt.getDate()).padStart(2, '0');
    const HH = String(dt.getHours()).padStart(2, '0');
    const mm = String(dt.getMinutes()).padStart(2, '0');
    let titleKind = mode===2 ? "気象警報・注意報" : mode===3 ? "気象警報" : "気象危険/特別警報";
    let text = `《${taisho_chiiki==="全国"?"全国の":""}${titleKind}》${taisho_chiiki!=="全国"?"\n"+taisho_chiiki:""}\n${MM}月${dd}日${HH}時${mm}分 ${regionReportDT?"発表":"更新"}`;
    let count = 0;
    const warnOrder = ["レベル5大雨特別警報","レベル5土砂災害特別警報","レベル5高潮特別警報","暴風特別警報","大雪特別警報","暴風雪特別警報","波浪特別警報","レベル4大雨危険警報","レベル4土砂災害危険警報","レベル4高潮危険警報","レベル3大雨警報","レベル3土砂災害警報","レベル3高潮警報","暴風警報","大雪警報","暴風雪警報","波浪警報","レベル2大雨注意報","レベル2土砂災害注意報","レベル2高潮注意報","強風注意報","大雪注意報","風雪注意報","雷注意報","波浪注意報","濃霧注意報","乾燥注意報","融雪注意報","なだれ注意報","低温注意報","霜注意報","着氷注意報","着雪注意報","その他の注意報"];
    const sortedWarnNames = [...warnOrder.filter(name => data.warnInfo[name]), ...Object.keys(data.warnInfo).filter(name => !warnOrder.includes(name))];
    
    for (const warnName of sortedWarnNames) {
      const areas = data.warnInfo[warnName];
      if (Object.keys(areas).length === 0) continue;
      const info = Object.values(warnArea).find(w => w.name === warnName);
      if (!info || info.level < mode) continue;
      let block = "";
      let hasArea = false;
      for (const areaName in areas) {
        if (taisho_chiiki !== "全国" && areaName !== taisho_chiiki) continue;
        const cities = areas[areaName];
        if (!cities || cities.length === 0) continue;
        if (!hasArea) { block += `\n\n${getWarnColor(info.level)}${warnName}`; hasArea = true; count++; }
        block += `\n【${areaName}】\n${cities.join(" ")}`;
      }
      text += block;
    }
    document.getElementById("eew").textContent = count===0 ? text + "\n\n発表中の警報・注意報はありません。" : text.trim();
  } catch(e) { if (updateId === latestUpdateId) document.getElementById("eew").textContent = "ERROR\n" + e; }
}

async function getCityWarningsByArea(warnArea,taisho_chiiki="全国") {
  const areaData = await getAreaData();
  const targetCodes = taisho_chiiki === "全国" ? Object.values(regionCodeByName) : [regionCodeByName[taisho_chiiki]];
  const warnByTypeAndArea = {};
  for (const info of Object.values(warnArea)) { if(info.name!=="解除" && info.name!=="未定・予約") warnByTypeAndArea[info.name] = {}; }
  let reportDatetime = "", regionReportDT = "", publishingOffice = "";
  const dataJson = await fetchR8WarningData(targetCodes);
  for (const item of dataJson) {
    if (!item || !item.warning) continue;
    if (reportDatetime==="") { reportDatetime = item.reportDatetime; publishingOffice = item.publishingOffice; }
    const largeAreaName = getRegionName(item.regionCode);
    if (largeAreaName && taisho_chiiki===largeAreaName) regionReportDT = item.reportDatetime;
    for (const area of item.warning.class20Items || []) {
      const cityInfo = areaData.class20s?.[area.areaCode];
      if (!cityInfo) continue;
      for (const w of area.kinds || []) {
        if (w.status === "解除") continue;
        const info = warnArea[w.code];
        if (info && warnByTypeAndArea[info.name]) {
          if (!warnByTypeAndArea[info.name][largeAreaName]) warnByTypeAndArea[info.name][largeAreaName] = [];
          if (!warnByTypeAndArea[info.name][largeAreaName].includes(cityInfo.name)) warnByTypeAndArea[info.name][largeAreaName].push(cityInfo.name);
        }
      }
    }
  }
  return {warnData: {warnInfo: warnByTypeAndArea, reportDatetime, publishingOffice}, regionReportDT};
}

async function getAreaData() { if (!areaDataCache) areaDataCache = await (await fetch(AREA_JSON_URL)).json(); return areaDataCache; }
function getRegionName(code) { return Object.keys(regionCodeByName).find(k => regionCodeByName[k] === code) || code; }
async function fetchR8WarningData(codes) { return (await Promise.all(codes.map(async c => (await fetch(`${WARNING_R8_BASE_URL}/${c}.json`)).json()))).flat(); }
function getWarnColor(l) { return l===2?"🟨":l===3?"🟥":l===4?"🟪":l===5?"⬛️":"◆"; }

window.addEventListener("load", update);
document.getElementById("copyBtn").addEventListener("click", async () => { await navigator.clipboard.writeText(document.getElementById("eew").textContent); alert("コピー完了"); });
document.querySelectorAll('input[name="mode"]').forEach(r => r.addEventListener("change", update));
document.getElementById("areaSelect").addEventListener("change", update);

function update() {
  setNowTime();
  const mode = document.querySelector('input[name="mode"]:checked').value === "all" ? 2 : document.querySelector('input[name="mode"]:checked').value === "keihou" ? 3 : 4;
  main(mode, document.getElementById("areaSelect").value);
}
</script>
</body>
</html>
