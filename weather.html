  function setNowTime() {

function getWarnColor(level){

  switch(level){

    case 2:
      return "🟨";

    case 3:
      return "🟥";

    case 4:
      return "🟪";

    case 5:
      return "⬛️";

    default:
      return "◆";

  }

}

async function fetchWarnings(regionCode){

  const url =
  `${WARNING_R8_BASE_URL}/${regionCode}.json`;

  const res =
  await fetch(url,{cache:"no-store"});

  return await res.json();

}
  const area = document.getElementById("areaSelect").value;
const mode = document.querySelector('input[name="mode"]:checked').value;

let minLevel = 3;
if(mode === "all") minLevel = 2;
if(mode === "danger") minLevel = 4;

let text =
`《全国の気象警報・注意報》
${new Date().toLocaleString("ja-JP")} 更新`;

const warnings = {};

data.forEach(region => {

  const regionName =
    region.area?.name || "";

  (region.warning || []).forEach(item => {

    const code = item.code;

    if(!warnArea[code]) return;

    const info = warnArea[code];

    if(info.level < minLevel) return;

    if(
      area !== "全国" &&
      regionName !== area
    ) return;

    if(!warnings[info.name]){
      warnings[info.name] = [];
    }

    warnings[info.name].push(regionName);

  });

});

Object.keys(warnings).forEach(name => {

  const icon =
    getWarnColor(
      Object.values(warnArea)
      .find(x => x.name === name)
      ?.level
    );

  text +=
`\n\n${icon}${name}${icon}\n`;

  text += warnings[name].join("　");

});

if(
  Object.keys(warnings).length === 0
){

  if(mode === "all"){
    text +=
"\n\n発表中の気象情報はありません";
  }

  if(mode === "warning"){
    text +=
"\n\n発表中の警報以上はありません";
  }

  if(mode === "danger"){
    text +=
"\n\n発表中の危険警報・特別警報はありません";
  }

}

result.textContent = text;

status.textContent =
"最終更新: " +
new Date().toLocaleString("ja-JP");

} catch(error){

console.error(error);

result.textContent =
`データ取得に失敗しました

GitHub Pagesでは
気象庁データの取得制限により
表示できない場合があります。`;

status.textContent = "取得失敗";

}

}

document.getElementById("result")
.textContent;

try{

await navigator.clipboard
.writeText(text);

const status =
document.getElementById("status");

status.textContent =
"✅ コピーしました";

setTimeout(() => {

}catch{
