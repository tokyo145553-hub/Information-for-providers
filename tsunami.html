<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>津波情報 | TokyoEastBranch</title>
<style>
    body { font-family: sans-serif; background: #f5f5f5; padding: 20px; max-width: 900px; margin: auto; }
    #backBtn { display:inline-block; margin-bottom:15px; padding:10px 16px; background:#0066cc; color:white; text-decoration:none; border-radius:8px; font-weight:bold; }
    .card { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); line-height: 1.8; }
    .warn { color: #d00; font-weight: bold; }
    .caution { color: #d90; font-weight: bold; }
    .info { color: #008; font-weight: bold; }
</style>
</head>
<body>
    <a href="index.html" id="backBtn">← トップへ戻る</a>
    <h1>津波情報</h1>
    <div id="content" class="card">情報を取得中...</div>

    <script>
        async function loadTsunami() {
            const content = document.getElementById("content");
            // APIの直接アクセスが失敗する場合、corsproxy.ioを経由して安定化させる
            const API_URL = "https://corsproxy.io/?https://api.p2pquake.net/v2/history?codes=552&limit=1";
            
            try {
                const res = await fetch(API_URL);
                if (!res.ok) throw new Error("APIサーバーの応答がありません");
                const data = await res.json();
                
                if (data.length === 0 || (data[0].tsunami && data[0].tsunami.cancelled)) {
                    content.innerHTML = "現在、発表されている津波情報はありません。";
                    return;
                }

                const t = data[0].tsunami;
                const time = new Date(data[0].time).toLocaleString("ja-JP");
                
                const grades = { "津波警報": [], "津波注意報": [], "津波予報(若干の海面変動)": [] };
                t.areas.forEach(a => { if (grades[a.grade]) grades[a.grade].push(a.name); });

                content.innerHTML = `
                    <h3>《津波に関する情報》</h3>
                    <p>${time} 気象庁発表</p>
                    <p><b>津波警報を発表しています。ただちに高い場所に避難してください。</b></p>
                    <hr>
                    ${grades["津波警報"].length ? `<p class="warn">🟥津波警報🟥<br>${grades["津波警報"].join(" ")}</p>` : ""}
                    ${grades["津波注意報"].length ? `<p class="caution">🟨津波注意報🟨<br>${grades["津波注意報"].join(" ")}</p>` : ""}
                    ${grades["津波予報(若干の海面変動)"].length ? `<p class="info">🟦津波予報(若干の海面変動)🟦<br>${grades["津波予報(若干の海面変動)"].join(" ")}</p>` : ""}
                    <button onclick="copyText()">📋 内容をコピー</button>
                `;
            } catch(e) {
                content.innerHTML = `<p>データ取得エラーが発生しました。</p>
                                     <p>APIの死活状況を確認してください: <br>
                                     <a href="https://api.p2pquake.net/v2/history?codes=552&limit=1" target="_blank">P2P APIを確認</a></p>`;
                console.error(e);
            }
        }

        function copyText() {
            const text = document.getElementById("content").innerText.replace("📋 内容をコピー", "");
            navigator.clipboard.writeText(text);
            alert("コピーしました");
        }
        loadTsunami();
    </script>
</body>
</html>
