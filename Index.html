<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>提供者向け情報サイト</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>
body{
    margin:0;
    font-family:sans-serif;
    background:#f5f5f5;
}

header{
    background:#0066cc;
    color:white;
    text-align:center;
    padding:15px;
    font-size:24px;
    font-weight:bold;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(140px,1fr));
    gap:15px;
    padding:20px;
    max-width:900px;
    margin:auto;
}

.card{
    background:white;
    border-radius:15px;
    text-decoration:none;
    color:#333;
    padding:25px 10px;
    text-align:center;
    box-shadow:0 2px 8px rgba(0,0,0,.15);
    transition:.2s;
}

.card:hover{
    transform:translateY(-5px);
}

.card i{
    font-size:40px;
    margin-bottom:10px;
}

.eq{color:#ff6600;}
.eew{color:#ff0000;}
.tsunami{color:#0066ff;}
.weather{color:#009900;}
.typhoon{color:#6633cc;}
.volcano{color:#cc3300;}
.river{color:#0099cc;}
.evacuate{color:#ff9900;}
</style>
</head>
<body>

<header>
提供者向け情報サイト
</header>

<div class="grid">

<a href="weather.html" class="card">
<i class="fa-solid fa-cloud-bolt weather"></i>
<div>気象警報</div>
</a>

<a href="typhoon.html" class="card">
<i class="fa-solid fa-hurricane typhoon"></i>
<div>台風情報</div>
</a>

</div>

</body>
</html>
