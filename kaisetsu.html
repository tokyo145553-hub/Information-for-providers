<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>気象解説情報</title>
<style>
body{ font-family:sans-serif; max-width:900px; margin:40px auto; padding:20px; background:#f5f5f5; }
#backBtn{ display:inline-block; margin-bottom:15px; padding:10px 16px; background:#0066cc; color:white; text-decoration:none; border-radius:8px; font-size:14px; font-weight:bold; }
h1{ text-align:center; margin-top:0; }
.buttons{ display:flex; justify-content:center; gap:10px; margin-bottom:15px; }
button{ padding:10px 18px; font-size:16px; border:none; border-radius:8px; cursor:pointer; }
#status{ text-align:center; margin-bottom:10px; color:green; font-size:14px; }

/* カードデザイン */
.item{ background:#fff; margin-bottom:20px; padding:20px; border-radius:12px; box-shadow:0 2px 8px rgba(0,0,0,0.05); border-left:5px solid #006837; }
.item h3 { margin-top: 0; color: #006837; font-size: 1.1em; }
.content-area{ background: #f9f9f9; padding: 15px; border-radius: 8px; margin: 10px 0; font-size: 14px; line-height: 1.6; white-space: pre-wrap; }
.copy-btn { width: 100%; background: #238636; color: white; padding: 10px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }
.copy-btn:hover { background: #1d722d; }
</style>
</head>
<body>

<a href="index.html" id="backBtn">← トップへ戻る</a>
<h1>気象解説情報</h1>

<div class="buttons">
    <button onclick="load()">🔄 最新情報を更新</button>
</div>

<div id="status"></div>
<div id="list"></div>

<script>
function load(){
  document.getElementById("status").innerText = "取得中...";
  google.script.run
    .withSuccessHandler(show)
    .withFailureHandler(() => document.getElementById("status").innerText = "取得失敗")
    .fetchWeather();
}

function show(data){
  const list = document.getElementById("list");
  list.innerHTML = "";
  const filtered = data.filter(d => d.title.includes("解説情報"));

  if(filtered.length === 0){
    list.innerHTML = "<p style='text-align:center;'>現在、対象の解説情報は発表されていません。</p>";
    return;
  }

  filtered.forEach(d => {
    const div = document.createElement("div");
    div.className = "item";
    
    // 見出しと本文をセットにした文字列
    const fullText = `【${d.headline}】\n\n${d.text}`;

    div.innerHTML = `
      <h3>${d.title}</h3>
      <div class="content-area"><strong>【${d.headline}】</strong><br>${d.text}</div>
      <button class="copy-btn" onclick="copyText('${fullText.replace(/'/g, "\\'").replace(/\n/g, "\\n")}')">📋 この情報をコピー</button>
    `;
    list.appendChild(div);
  });

  document.getElementById("status").innerText = "最終更新: " + new Date().toLocaleTimeString();
}

function copyText(text) {
  navigator.clipboard.writeText(text);
  alert("コピーしました");
}

window.onload = load;
</script>
</body>
</html>
