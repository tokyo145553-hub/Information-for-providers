<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<style>
body{
font-family:sans-serif;
background:#0d1117;
color:#c9d1d9;
margin:0;
padding:15px;
}

h2{
border-bottom:2px solid #2ecc71;
padding-bottom:6px;
}

#status{
font-size:12px;
color:#aaa;
margin-bottom:10px;
}

.topbar{
margin-bottom:15px;
}

.reload-btn{
background:#238636;
color:white;
border:none;
padding:8px 14px;
border-radius:6px;
cursor:pointer;
font-size:14px;
}

.reload-btn:hover{
opacity:0.9;
}

.item{
background:#161b22;
margin:10px 0;
padding:12px;
border-radius:6px;
}

.copy-btn{
margin-top:10px;
padding:5px 10px;
cursor:pointer;
}
</style>
</head>

<body>

<h2>⛅ 全国の気象情報</h2>

<div class="topbar">
  <button class="reload-btn" onclick="load()">
    🔄 手動更新
  </button>
</div>

<div id="status">手動更新してください</div>

<div id="list">未取得</div>

<script>

function toJST(u){

  const d = new Date(u);

  return d.toLocaleString('ja-JP',{
    timeZone:'Asia/Tokyo',
    day:'numeric',
    hour:'2-digit',
    minute:'2-digit'
  }).replace('/','日 ');
}

function show(data){

  const list=document.getElementById("list");

  list.innerHTML="";

  if(!data || data.length===0){

    list.innerHTML="情報なし";
    return;
  }

  data.forEach(d=>{

    const div=document.createElement("div");

    div.className="item";

    const date=toJST(d.datetime);

    const body=d.text.replace(/【.+?】/,"");

    const message=
      "≪"+d.title+"≫\n"+
      date+" 気象庁発表\n\n"+
      "【"+d.headline+"】\n\n"+
      body;

    div.innerHTML=`
      ≪${d.title}≫<br>
      ${date} 気象庁発表<br><br>

      【${d.headline}】<br><br>

      ${body.replace(/\n/g,"<br>")}

      <br>
      <button class="copy-btn">📋 コピー</button>
    `;

    div.querySelector(".copy-btn").onclick=()=>{

      navigator.clipboard.writeText(message);

      alert("コピーしました");
    };

    list.appendChild(div);

  });

  document.getElementById("status").innerText =
    "最終更新 " + new Date().toLocaleTimeString();

}

// 手動取得のみ
function load(){

  document.getElementById("status").innerText =
    "取得中...";

  google.script.run
    .withSuccessHandler(show)
    .withFailureHandler(()=>{
      document.getElementById("status").innerText =
        "取得失敗";
    })
    .fetchWeather();
}

// ▼ 自動更新なし

</script>

</body>
</html>
