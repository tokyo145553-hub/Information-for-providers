<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>提供者向け情報サイト | TokyoEastBranch</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>
:root {
    --primary-color: #003b80;
    --accent-color: #006837;
    --bg-color: #f4f7fb;
    --text-color: #333;
}

html, body {
    margin: 0;
    padding: 0;
    font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", Meiryo, sans-serif;
    background: var(--bg-color);
    color: var(--text-color);
    line-height: 1.6;
    overflow-x: hidden;
}

html { scroll-behavior: smooth; }

/* HEADER */
header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 20px 6%;
    background: linear-gradient(135deg, #001f4d, var(--primary-color));
    color: #fff;
    position: relative;
}

.header-left {
    display: flex;
    align-items: center;
    gap: 18px;
}

.logo {
    width: 60px;
    height: 60px;
    border-radius: 50%;
    background: #fff;
    padding: 4px;
    object-fit: contain;
}

.header-title h1 { margin: 0; font-size: 22px; }
.header-title p { margin: 0; font-size: 12px; opacity: 0.8; }

#clock { font-family: monospace; }

.menu-btn {
    position: absolute;
    right: 20px;
    top: 18px;
    font-size: 28px;
    cursor: pointer;
}

/* OVERLAY */
.overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.4);
    display: none;
    z-index: 999;
}
.overlay.active { display: block; }

/* SIDE MENU */
.side-menu {
    position: fixed;
    top: 0;
    right: 0;
    width: 300px;
    height: 100%;
    background: #fff;
    transform: translateX(100%);
    transition: 0.3s;
    z-index: 1000;
    padding: 20px;
    overflow-y: auto;
}
.side-menu.active { transform: translateX(0); }

.side-menu h3 { color: var(--primary-color); }

/* ACCORDION */
.accordion-item { margin-top: 10px; }

.accordion-btn {
    width: 100%;
    text-align: left;
    padding: 12px;
    border: none;
    background: #f4f7fb;
    border-radius: 8px;
    font-weight: bold;
    cursor: pointer;
}

.accordion-content { display: none; padding-left: 10px; }

.accordion-content a {
    display: block;
    padding: 8px;
    text-decoration: none;
    color: var(--text-color);
}

/* NAV */
.nav-menu { text-align: center; padding: 25px; }

.nav-btn {
    padding: 12px 22px;
    border: 2px solid var(--primary-color);
    background: #fff;
    border-radius: 30px;
    font-weight: bold;
    text-decoration: none;
}

/* GRID */
.section-title {
    text-align: center;
    margin: 35px 0 20px;
    font-size: 28px;
    color: var(--primary-color);
}

.grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 22px;
    padding: 0 6% 50px;
    max-width: 1300px;
    margin: auto;
}

/* CARD */
.card {
    background: #fff;
    border-radius: 18px;
    padding: 25px 18px;
    text-align: center;
    text-decoration: none;
    color: var(--text-color);
    box-shadow: 0 4px 10px rgba(0,0,0,0.05);
    transition: 0.25s;
}
.card:hover { transform: translateY(-6px); }

.card i {
    font-size: 38px;
    margin-bottom: 12px;
    color: var(--accent-color);
}

/* TAGS */
.tags {
    display: flex;
    justify-content: center;
    gap: 5px;
    flex-wrap: wrap;
}

.tags span {
    font-size: 11px;
    padding: 4px 7px;
    border-radius: 6px;
    color: #fff;
}

.tag-status { background: #6633cc; }
.tag-copy { background: #0066cc; }
.tag-unavailable { background: #cc0000; }

@media (max-width:768px){
    .grid{grid-template-columns:1fr;}
    header{flex-direction:column;align-items:flex-start;}
}
</style>
</head>

<body>

<header>
    <div class="header-left">
        <img src="images/teb.png.JPG" class="logo">
        <div class="header-title">
            <h1>提供者向け情報サイト</h1>
            <p>TokyoEastBranch Provider Portal</p>
        </div>
    </div>

    <div id="clock">--:--:--</div>

    <div class="menu-btn" onclick="toggleMenu()">
        <i class="fa-solid fa-bars"></i>
    </div>
</header>

<div class="overlay" onclick="toggleMenu()"></div>

<!-- SIDE MENU -->
<div class="side-menu" id="menu">

    <h3>メニュー</h3>

    <!-- 気象 -->
    <div class="accordion-item">
        <button class="accordion-btn" onclick="toggleAccordion(this)">🌤 気象情報</button>
        <div class="accordion-content">
            <a href="#weather-section" onclick="toggleMenu()">気象情報一覧TOP</a>
            <a href="weather.html">気象警報</a>
            <a href="tenki.html">天気予報</a>
            <a href="typhoon.html">台風情報</a>
            <a href="tornado.html">竜巻注意情報</a>
            <a href="https://script.google.com/macros/s/AKfycbwoh1YsazOyU86oMUv0RJSMhfBXs036Rz0eoi1iz6l8MruUU3oIJV0n8FOp8QCZZq6fNQ/exec">
                気象解説情報
            </a>
        </div>
    </div>

    <!-- 地震 -->
    <div class="accordion-item">
        <button class="accordion-btn" onclick="toggleAccordion(this)">🌏 地震・津波情報</button>
        <div class="accordion-content">
            <a href="#eq-section" onclick="toggleMenu()">地震・津波一覧TOP</a>
            <a href="https://tokyo145553-hub.github.io/Mouyada/">地震情報</a>
        </div>
    </div>

    <!-- その他 -->
    <div class="accordion-item">
        <button class="accordion-btn" onclick="toggleAccordion(this)">📄 その他</button>
        <div class="accordion-content">
            <a href="terms.html">利用規約</a>
        </div>
    </div>

</div>

<!-- 気象ナビ -->
<nav class="nav-menu">
    <a href="#weather-section" class="nav-btn">気象情報一覧</a>
</nav>

<!-- 地震ナビ（追加） -->
<nav class="nav-menu">
    <a href="#eq-section" class="nav-btn">地震・津波情報一覧</a>
</nav>

<!-- 気象 -->
<section id="weather-section">
    <h2 class="section-title">気象情報メニュー</h2>

    <div class="grid">

        <a href="weather.html" class="card">
            <i class="fa-solid fa-cloud-bolt"></i>
            <h3>気象警報</h3>
            <div class="tags">
                <span class="tag-status">警報・注意報</span>
                <span class="tag-copy">転載可</span>
            </div>
        </a>

        <a href="tenki.html" class="card">
            <i class="fa-solid fa-temperature-full"></i>
            <h3>天気予報</h3>
            <div class="tags">
                <span class="tag-status">公式予報</span>
                <span class="tag-copy">転載可</span>
            </div>
        </a>

        <a href="typhoon.html" class="card">
            <i class="fa-solid fa-hurricane"></i>
            <h3>台風情報</h3>
            <div class="tags">
                <span class="tag-status">実況情報</span>
                <span class="tag-copy">転載可</span>
            </div>
        </a>

        <a href="tornado.html" class="card">
            <i class="fa-solid fa-tornado"></i>
            <h3>竜巻注意情報</h3>
            <div class="tags">
                <span class="tag-status">注意情報</span>
                <span class="tag-copy">転載可</span>
            </div>
        </a>

        <a href="https://script.google.com/macros/s/AKfycbwoh1YsazOyU86oMUv0RJSMhfBXs036Rz0eoi1iz6l8MruUU3oIJV0n8FOp8QCZZq6fNQ/exec"
           class="card" target="_blank">
            <i class="fa-solid fa-file-lines"></i>
            <h3>気象解説情報</h3>
            <div class="tags">
                <span class="tag-unavailable">外部</span>
                <span class="tag-copy">転載可</span>
            </div>
        </a>

    </div>
</section>

<!-- 地震 -->
<section id="eq-section">
    <h2 class="section-title">地震・津波情報メニュー</h2>

    <div class="grid">

        <a href="https://tokyo145553-hub.github.io/Mouyada/" class="card">
            <i class="fa-solid fa-earth-asia"></i>
            <h3>地震情報</h3>
            <div class="tags">
                <span class="tag-unavailable">外部</span>
                <span class="tag-copy">転載可</span>
            </div>
        </a>

    </div>
</section>

<!-- その他 -->
<section>
    <h2 class="section-title">その他</h2>

    <div class="grid">
        <a href="terms.html" class="card">
            <i class="fa-solid fa-file-contract"></i>
            <h3>利用規約</h3>
            <div class="tags">
                <span class="tag-status">規約</span>
                <span class="tag-copy">必読</span>
            </div>
        </a>
    </div>
</section>

<footer style="text-align:center;padding:20px;color:#888;">
    &copy; TokyoEastBranch
</footer>

<script>
function updateClock(){
    document.getElementById("clock").textContent =
        new Date().toLocaleTimeString('ja-JP');
}
setInterval(updateClock,1000);
updateClock();

function toggleMenu(){
    document.getElementById("menu").classList.toggle("active");
    document.querySelector(".overlay").classList.toggle("active");
}

function toggleAccordion(btn){
    const c = btn.nextElementSibling;
    c.style.display = (c.style.display==="block")?"none":"block";
}
</script>

</body>
</html>
