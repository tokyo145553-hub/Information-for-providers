<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>提供者向け情報サイト</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:"Yu Gothic","Meiryo",sans-serif;
}

body{
    background:#eef3f8;
}

/* ヘッダー */
header{
    background:linear-gradient(135deg,#0066cc,#00a2ff);
    color:white;
    text-align:center;
    padding:25px 15px;
    box-shadow:0 3px 10px rgba(0,0,0,.2);
}

header h1{
    font-size:32px;
    margin-bottom:8px;
}

#clock{
    font-size:14px;
}

/* カード */
.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
    gap:20px;
    padding:25px;
    max-width:1000px;
    margin:auto;
}

.card{
    background:white;
    border-radius:20px;
    text-decoration:none;
    color:#333;
    padding:35px 15px;
    text-align:center;
    box-shadow:0 3px 10px rgba(0,0,0,.15);
    transition:.2s;
}

.card:hover{
    transform:translateY(-5px);
}

.card i{
    font-size:72px;
    margin-bottom:15px;
}

.card h3{
    font-size:22px;
    margin-bottom:10px;
}

.weather-card{
    border-top:8px solid #00aa00;
}

.typhoon-card{
    border-top:8px solid #00aa00;
}

.weather{
    color:#00aa00;
}

.typhoon{
    color:#00aa00;
}

/* バッジ */
.tags{
    margin-top:10px;
}

.tags span{
    display:inline-block;
    margin:3px;
    padding:5px 8px;
    border-radius:6px;
    font-size:12px;
    color:white;
    font-weight:bold;
}

.lv2{
    background:#e0b400;
    color:black;
}

.lv3{
    background:#d32f2f;
}

.lv4{
    background:#7b1fa2;
}

.lv5{
    background:#000;
}

/* フッター */
footer{
    text-align:center;
    color:#888;
    font-size:12px;
    padding:20px;
}
</style>
</head>

<body>

<header>
    <h1>提供者向け情報サイト</h1>
    <div id="clock"></div>
</header>

<div class="grid">

    <a href="weather.html" class="card weather-card">
        <i class="fa-solid fa-cloud-bolt weather"></i>

        <h3>気象警報</h3>

        <div class="tags">
            <span class="lv2">注意報</span>
            <span class="lv3">警報</span>
            <span class="lv4">危険警報</span>
            <span class="lv5">特別警報</span>
            <span style="background:#0066cc;">転載可</span>
        </div>

    </a>

    <a href="typhoon.html" class="card typhoon-card">
        <i class="fa-solid fa-hurricane typhoon"></i>

        <h3>台風情報</h3>

        <div class="tags">
            <span style="background:#6633cc;">実況</span>
            <span style="background:#0066cc;">転載可</span>
        </div>

    </a>

</div>

<footer>
    Developed by TokyoEastBranch
</footer>

<script>
function updateClock(){
    const now = new Date();

    const y = now.getFullYear();
    const m = String(now.getMonth()+1).padStart(2,"0");
    const d = String(now.getDate()).padStart(2,"0");
    const h = String(now.getHours()).padStart(2,"0");
    const min = String(now.getMinutes()).padStart(2,"0");
    const s = String(now.getSeconds()).padStart(2,"0");

    document.getElementById("clock").textContent =
        `${y}/${m}/${d} ${h}:${min}:${s}`;
}

updateClock();
setInterval(updateClock,1000);
</script>

</body>
</html>
