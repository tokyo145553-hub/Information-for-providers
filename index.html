 <!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>提供者向け情報サイト</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
<img src="images/teb.png" class="logo" alt="TEB">
*{margin:0;padding:0;box-sizing:border-box;font-family:"Yu Gothic","Meiryo",sans-serif}
body{background:#f4f7fb;color:#333}
header{
display:flex;justify-content:space-between;align-items:center;
padding:18px 28px;
background:linear-gradient(135deg,#001f4d,#003b80);
color:#fff;box-shadow:0 4px 12px rgba(0,0,0,.25)}
.header-left{display:flex;align-items:center;gap:16px}
.logo{width:72px;height:72px;border-radius:50%;background:#fff;padding:4px}
.header-title h1{font-size:30px}
.header-title p{opacity:.85;font-size:14px;margin-top:4px}
#clock{font-size:16px;font-weight:bold}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:20px;padding:25px;max-width:1000px;margin:auto}
.card{background:#fff;border-radius:22px;padding:35px 20px;text-decoration:none;color:#333;
box-shadow:0 6px 18px rgba(0,0,0,.08);border:1px solid #dbe5ef;transition:.25s}
.card:hover{transform:translateY(-6px);box-shadow:0 12px 30px rgba(0,0,0,.15)}
.card i{font-size:72px;margin-bottom:15px}
.card h3{font-size:22px;margin-bottom:10px}
.weather-card,.typhoon-card{border-top:7px solid #006837}
.weather,.typhoon{color:#006837}
.tags{margin-top:10px}
.tags span{display:inline-block;margin:3px;padding:5px 8px;border-radius:6px;font-size:12px;color:#fff;font-weight:bold}
.lv2{background:#e0b400;color:#000}.lv3{background:#d32f2f}.lv4{background:#7b1fa2}.lv5{background:#000}
footer{text-align:center;color:#666;font-size:12px;padding:20px}
@media(max-width:700px){
header{flex-direction:column;gap:12px;text-align:center}
.header-left{flex-direction:column}
.logo{width:64px;height:64px}
.header-title h1{font-size:24px}
}
</style>
</head>
<body>
<header>
<div class="header-left">
<img src="teb.png" class="logo" alt="TEB">
<div class="header-title">
<h1>提供者向け情報サイト</h1>
<p>TokyoEastBranch Provider Portal</p>
</div>
</div>
<div id="clock"></div>
</header>

<div class="grid">
<a href="weather.html" class="card weather-card">
<i class="fa-solid fa-cloud-bolt weather"></i>
<h3>気象警報</h3>
<div class="tags">
<span class="lv2">注意報</span>
<span class="lv3">警報</span>
<span class="lv4">危険警報</span>
<span class="lv5">特別警報</span>
<span style="background:#0066cc;">転載可</span>
</div>
</a>

<a href="typhoon.html" class="card typhoon-card">
<i class="fa-solid fa-hurricane typhoon"></i>
<h3>台風情報</h3>
<div class="tags">
<span style="background:#6633cc;">実況</span>
<span style="background:#0066cc;">転載可</span>
</div>
</a>
</div>

<footer>Developed by TokyoEastBranch</footer>

<script>
function updateClock(){
const n=new Date();
const f=v=>String(v).padStart(2,"0");
document.getElementById("clock").textContent=
`${n.getFullYear()}/${f(n.getMonth()+1)}/${f(n.getDate())} ${f(n.getHours())}:${f(n.getMinutes())}:${f(n.getSeconds())}`;
}
updateClock();
setInterval(updateClock,1000);
</script>
</body>
</html>
