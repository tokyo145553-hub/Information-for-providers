<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>提供者向け情報サイト | TokyoEastBranch</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
:root {
    --primary-color: #003b80;
    --accent-color: #006837;
    --bg-color: #f4f7fb;
    --text-color: #333;
}

html { scroll-behavior: smooth; }
body { margin: 0; padding: 0; font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", Meiryo, sans-serif; background: var(--bg-color); color: var(--text-color); line-height: 1.6; }

/* Header */
header { display: flex; justify-content: space-between; align-items: center; padding: 20px 5%; background: linear-gradient(135deg, #001f4d, var(--primary-color)); color: #fff; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
.header-left { display: flex; align-items: center; gap: 20px; }
.logo { width: 60px; height: 60px; border-radius: 50%; background: #fff; padding: 4px; object-fit: contain; }
.header-title h1 { font-size: 24px; margin: 0; }
.header-title p { opacity: 0.8; font-size: 12px; margin: 0; }
#clock { font-family: monospace; font-size: 1.1rem; }

/* Navigation */
.nav-menu { padding: 30px; text-align: center; }
.nav-btn { display: inline-block; padding: 12px 25px; background: #fff; color: var(--primary-color); border: 2px solid var(--primary-color); text-decoration: none; border-radius: 30px; font-weight: bold; transition: 0.3s; }
.nav-btn:hover { background: var(--primary-color); color: #fff; }

/* Grid Layout */
.section-title { text-align: center; margin: 40px 0 20px; font-size: 28px; color: var(--primary-color); }
.grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 20px; padding: 0 5% 50px; max-width: 1200px; margin: auto; }

/* Cards */
.card { background: #fff; border-radius: 20px; padding: 30px 20px; text-decoration: none; color: var(--text-color); box-shadow: 0 4px 10px rgba(0,0,0,0.05); border: 1px solid rgba(0,0,0,0.05); transition: 0.3s; display: flex; flex-direction: column; align-items: center; text-align: center; }
.card:hover { transform: translateY(-8px); box-shadow: 0 15px 30px rgba(0,0,0,0.1); }
.card i { font-size: 40px; margin-bottom: 20px; color: var(--accent-color); }
.card h3 { font-size: 18px; margin-bottom: 15px; }

/* Tags */
.tags { display: flex; flex-wrap: wrap; gap: 5px; justify-content: center; }
.tags span { padding: 4px 8px; border-radius: 6px; font-size: 11px; color: #fff; font-weight: bold; }
.tag-status { background: #6633cc; }
.tag-copy { background: #0066cc; }
.tag-unavailable { background: #cc0000; }

footer { text-align: center; padding: 30px; font-size: 12px; color: #888; border-top: 1px solid #ddd; }
</style>
</head>
<body>

<header>
    <div class="header-left">
        <img src="images/teb.png.JPG" class="logo" alt="TEB">
        <div class="header-title">
            <h1>提供者向け情報サイト</h1>
            <p>TokyoEastBranch Provider Portal</p>
        </div>
    </div>
    <div id="clock">--:--:--</div>
</header>

<nav class="nav-menu">
    <a href="#weather-section" class="nav-btn"><i class="fa-solid fa-arrow-down"></i> 気象情報一覧を表示</a>
</nav>

<section id="weather-section">
    <h2 class="section-title">気象情報メニュー</h2>
    <div class="grid">
        <a href="weather.html" class="card">
            <i class="fa-solid fa-cloud-bolt"></i>
            <h3>気象警報</h3>
            <div class="tags">
                <span class="tag-status">発表状況確認</span>
                <span class="tag-copy">転載可</span>
            </div>
        </a>
        <a href="tenki.html" class="card">
            <i class="fa-solid fa-temperature-full"></i>
            <h3>天気予報</h3>
            <div class="tags">
                <span class="tag-status">気象庁天気予報</span>
                <span class="tag-copy">転載可</span>
            </div>
        </a>
        <a href="typhoon.html" class="card">
            <i class="fa-solid fa-hurricane"></i>
            <h3>台風情報</h3>
            <div class="tags">
                <span class="tag-status">実況</span>
                <span class="tag-copy">転載可</span>
            </div>
        </a>
        <a href="tornado.html" class="card">
            <i class="fa-solid fa-tornado"></i>
            <h3>竜巻注意情報</h3>
            <div class="tags">
                <span class="tag-status">発表確認</span>
                <span class="tag-copy">転載可</span>
            </div>
        </a>
        <a href="https://script.google.com/macros/s/AKfycbwoh1YsazOyU86oMUv0RJSMhfBXs036Rz0eoi1iz6l8MruUU3oIJV0n8FOp8QCZZq6fNQ/exec" class="card" target="_blank">
            <i class="fa-solid fa-file-lines"></i>
            <h3>気象解説情報</h3>
            <div class="tags">
                <span class="tag-unavailable">外部</span>
                <span class="tag-copy">転載可</span>
            </div>
        </a>
    </div>
</section>

<footer>&copy; TokyoEastBranch All Rights Reserved.</footer>

<script>
function updateClock(){
    const n = new Date();
    document.getElementById("clock").textContent = n.toLocaleTimeString('ja-JP');
}
setInterval(updateClock, 1000);
updateClock();
</script>
</body>
</html>
