<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>提供者向け情報サイト | TokyoEastBranch</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>
:root {
    --primary-color: #003b80;
    --accent-color: #006837;
    --bg-color: #f4f7fb;
    --text-color: #333;
}

html, body {
    margin: 0;
    padding: 0;
    font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", Meiryo, sans-serif;
    background: var(--bg-color);
    color: var(--text-color);
    line-height: 1.6;
    overflow-x: hidden; /* ★白い帯防止 */
}

html {
    scroll-behavior: smooth;
}

/* ================= HEADER ================= */
header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 20px 6%;
    background: linear-gradient(135deg, #001f4d, var(--primary-color));
    color: #fff;
    position: relative;
}

.header-left {
    display: flex;
    align-items: center;
    gap: 18px;
}

.logo {
    width: 60px;
    height: 60px;
    border-radius: 50%;
    background: #fff;
    padding: 4px;
    object-fit: contain;
}

.header-title h1 {
    font-size: 22px;
    margin: 0;
}

.header-title p {
    font-size: 12px;
    margin: 0;
    opacity: 0.8;
}

#clock {
    font-family: monospace;
}

/* ================= MENU BUTTON ================= */
.menu-btn {
    position: absolute;
    right: 20px;
    top: 18px;
    font-size: 28px;
    cursor: pointer;
}

/* ================= OVERLAY ================= */
.overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.4);
    display: none;
    z-index: 999;
}

.overlay.active {
    display: block;
}

/* ================= SIDE MENU ================= */
.side-menu {
    position: fixed;
    top: 0;
    right: 0;
    width: 300px;
    height: 100%;
    background: #fff;
    box-shadow: -5px 0 20px rgba(0,0,0,0.25);
    transform: translateX(100%); /* ★完全非表示 */
    transition: transform 0.3s ease;
    z-index: 1000;
    padding: 20px;
    overflow-y: auto;
}

.side-menu.active {
    transform: translateX(0); /* ★表示 */
}

.side-menu h3 {
    margin-top: 10px;
    color: var(--primary-color);
}

/* ================= ACCORDION ================= */
.accordion {
    margin-top: 10px;
    border-top: 1px solid #ddd;
}

.accordion-item {
    margin-top: 8px;
}

.accordion-btn {
    width: 100%;
    text-align: left;
    padding: 12px;
    border: none;
    background: #f4f7fb;
    border-radius: 8px;
    cursor: pointer;
    font-weight: bold;
}

.accordion-content {
    display: none;
    padding-left: 10px;
    margin-top: 5px;
}

.accordion-content a {
    display: block;
    padding: 8px;
    margin: 4px 0;
    text-decoration: none;
    color: var(--text-color);
    border-radius: 6px;
}

.accordion-content a:hover {
    background: #eef3ff;
}

/* ================= NAV ================= */
.nav-menu {
    padding: 25px;
    text-align: center;
}

.nav-btn {
    display: inline-block;
    padding: 12px 22px;
    background: #fff;
    color: var(--primary-color);
    border: 2px solid var(--primary-color);
    border-radius: 30px;
    font-weight: bold;
}

/* ================= GRID ================= */
.section-title {
    text-align: center;
    margin: 35px 0 20px;
    font-size: 28px;
    color: var(--primary-color);
}

.grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 22px;
    padding: 0 6% 50px;
    max-width: 1300px;
    margin: auto;
}

/* ================= CARD ================= */
.card {
    background: #fff;
    border-radius: 18px;
    padding: 25px 18px;
    text-align: center;
    text-decoration: none;
    color: var(--text-color);
    box-shadow: 0 4px 10px rgba(0,0,0,0.05);
    transition: 0.25s;
}

.card:hover {
    transform: translateY(-6px);
}

.card i {
    font-size: 38px;
    margin-bottom: 12px;
    color: var(--accent-color);
}

/* ================= TAGS（削除なし維持） ================= */
.tags {
    display: flex;
    justify-content: center;
    gap: 5px;
    flex-wrap: wrap;
}

.tags span {
    font-size: 11px;
    padding: 4px 7px;
    border-radius: 6px;
    color: #fff;
}

.tag-status { background: #6633cc; }
.tag-copy { background: #0066cc; }
.tag-unavailable { background: #cc0000; }

/* ================= MOBILE ================= */
@media (max-width: 768px) {
    .grid {
        grid-template-columns: 1fr;
        padding: 0 15px;
    }

    header {
        flex-direction: column;
        align-items: flex-start;
        padding: 15px;
    }

    #clock {
        align-self: flex-end;
    }
}
</style>
</head>

<body>

<header>
    <div class="header-left">
        <img src="images/teb.png.JPG" class="logo">
        <div class="header-title">
            <h1>提供者向け情報サイト</h1>
            <p>TokyoEastBranch Provider Portal</p>
        </div>
    </div>

    <div id="clock">--:--:--</div>

    <div class="menu-btn" onclick="toggleMenu()">
        <i class="fa-solid fa-bars"></i>
    </div>
</header>

<div class="overlay" onclick="toggleMenu()"></div>

<!-- ================= SIDE MENU ================= -->
<div class="side-menu" id="menu">
    <h3>メニュー</h3>

    <!-- 気象情報 -->
    <div class="accordion-item">
        <button class="accordion-btn" onclick="toggleAccordion(this)">
            🌤 気象情報（詳細）
        </button>

        <div class="accordion-content">

            <a href="#weather-section" onclick="toggleMenu()">気象メニューTOP</a>
            <a href="weather.html">気象警報</a>
            <a href="tenki.html">天気予報</a>
            <a href="typhoon.html">台風情報</a>
            <a href="tornado.html">気象防災速報（竜巻注意）</a>
            <a href="https://script.google.com/macros/s/AKfycbwoh1YsazOyU86oMUv0RJSMhfBXs036Rz0eoi1iz6l8MruUU3oIJV0n8FOp8QCZZq6fNQ/exec">
                気象解説情報（地方・全般）
            </a>

        </div>
    </div>

    <!-- ================= その他（ここが重要） ================= -->
    <div class="accordion-item">
        <button class="accordion-btn" onclick="toggleAccordion(this)">
            📄 その他
        </button>

        <div class="accordion-content">

            <a href="terms.html" onclick="toggleMenu()">
                利用規約
            </a>

        </div>
    </div>

</div>
    
<nav class="nav-menu">
    <a href="#weather-section" class="nav-btn">気象情報一覧</a>
</nav>

<section id="weather-section">
    <h2 class="section-title">気象情報メニュー</h2>

    <div class="grid">

        <a href="weather.html" class="card">
            <i class="fa-solid fa-cloud-bolt"></i>
            <h3>気象警報</h3>
            <div class="tags">
                <span class="tag-status">発表状況</span>
                <span class="tag-copy">転載可</span>
            </div>
        </a>

        <a href="tenki.html" class="card">
            <i class="fa-solid fa-temperature-full"></i>
            <h3>天気予報</h3>
            <div class="tags">
                <span class="tag-status">気象庁天気予報</span>
                <span class="tag-copy">転載可</span>
            </div>
        </a>

        <a href="typhoon.html" class="card">
            <i class="fa-solid fa-hurricane"></i>
            <h3>台風情報</h3>
            <div class="tags">
                <span class="tag-status">実況</span>
                <span class="tag-copy">転載可</span>
            </div>
        </a>

        <a href="tornado.html" class="card">
            <i class="fa-solid fa-tornado"></i>
            <h3>気象防災速報（竜巻注意）</h3>
            <div class="tags">
                <span class="tag-status">発表状況</span>
                <span class="tag-copy">転載可</span>
            </div>
        </a>

        <a href="https://script.google.com/macros/s/AKfycbwoh1YsazOyU86oMUv0RJSMhfBXs036Rz0eoi1iz6l8MruUU3oIJV0n8FOp8QCZZq6fNQ/exec"
           class="card" target="_blank">
            <i class="fa-solid fa-file-lines"></i>
            <h3>気象解説情報（地方・全般）</h3>
            <div class="tags">
                <span class="tag-unavailable">外部</span>
                <span class="tag-copy">転載可</span>
            </div>
        </a>

    </div>
</section>

<section class="section-title" style="font-size:18px; color:#666; margin-top:40px;">
    その他
</section>

<div class="grid">

    <a href="terms.html" class="card">
        <i class="fa-solid fa-file-contract"></i>
        <h3>利用規約</h3>
        <div class="tags">
            <span class="tag-status">規約</span>
            <span class="tag-copy">確認必須</span>
        </div>
    </a>

</div>
<footer style="text-align:center;padding:20px;color:#888;">
    &copy; TokyoEastBranch
</footer>

<script>
function updateClock(){
    document.getElementById("clock").textContent =
        new Date().toLocaleTimeString('ja-JP');
}
setInterval(updateClock,1000);
updateClock();

function toggleMenu(){
    document.getElementById("menu").classList.toggle("active");
    document.querySelector(".overlay").classList.toggle("active");
}

function toggleAccordion(btn){
    const content = btn.nextElementSibling;
    content.style.display =
        content.style.display === "block" ? "none" : "block";
}
</script>

</body>
</html>
