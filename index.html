<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>提供者向け情報サイト</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
/* スムーズスクロールの設定 */
html { scroll-behavior: smooth; }

*{margin:0;padding:0;box-sizing:border-box;font-family:"Yu Gothic","Meiryo",sans-serif}
body{background:#f4f7fb;color:#333; padding-bottom: 50px;}

header{
display:flex;justify-content:space-between;align-items:center;
padding:18px 28px;
background:linear-gradient(135deg,#001f4d,#003b80);
color:#fff;box-shadow:0 4px 12px rgba(0,0,0,.25)}
.header-left{display:flex;align-items:center;gap:16px}
.logo{width:72px;height:72px;border-radius:50%;background:#fff;padding:4px}
.header-title h1{font-size:30px}
.header-title p{opacity:.85;font-size:14px;margin-top:4px}
#clock{font-size:16px;font-weight:bold}

/* 目次ナビゲーション */
.nav-menu { text-align: center; padding: 20px; background: #fff; margin-bottom: 20px; }
.nav-btn { display: inline-block; padding: 10px 20px; background: #003b80; color: #fff; text-decoration: none; border-radius: 20px; margin: 0 10px; font-weight: bold; }

.section-title { text-align: center; margin: 30px 0 15px; color: #003b80; }

.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px, 240px)); justify-content:center; gap:20px;padding:25px;max-width:1000px;margin:auto}

/* カードサイズの調整 */
.card{background:#fff;border-radius:18px;padding:25px 15px;text-decoration:none;color:#333;
box-shadow:0 4px 12px rgba(0,0,0,.08);border:1px solid #dbe5ef;transition:.25s; text-align: center;}
.card:hover{transform:translateY(-6px);box-shadow:0 12px 30px rgba(0,0,0,.15)}
.card i{font-size:50px;margin-bottom:15px} /* アイコンサイズ調整 */
.card h3{font-size:18px;margin-bottom:10px}

.weather-card,.typhoon-card{border-top:7px solid #006837}
.weather,.typhoon{color:#006837}
.tags span{display:inline-block;margin:2px;padding:3px 6px;border-radius:4px;font-size:10px;color:#fff;font-weight:bold}

footer{text-align:center;color:#666;font-size:12px;padding:20px}
</style>
</head>
<body>
<header>
<div class="header-left">
<img src="images/teb.png.JPG" class="logo" alt="TEB">
<div class="header-title">
<h1>提供者向け情報サイト</h1>
<p>TokyoEastBranch Provider Portal</p>
</div>
</div>
<div id="clock"></div>
</header>

<nav class="nav-menu">
    <a href="#weather-section" class="nav-btn">気象情報へジャンプ</a>
</nav>

<section id="weather-section">
    <h2 class="section-title">気象情報</h2>
    <div class="grid">
        <a href="weather.html" class="card weather-card">
            <i class="fa-solid fa-cloud-bolt weather"></i>
            <h3>気象警報</h3>
            <div class="tags">
                <span style="background:#e0b400;color:#000;">注意報</span>
                <span style="background:#d32f2f;">警報</span>
                <span style="background:#7b1fa2;">危険</span>
            </div>
        </a>

        <a href="typhoon.html" class="card typhoon-card">
            <i class="fa-solid fa-hurricane typhoon"></i>
            <h3>台風情報</h3>
            <div class="tags">
                <span style="background:#6633cc;">実況</span>
                <span style="background:#0066cc;">転載可</span>
            </div>
        </a>
    </div>
</section>

<footer>Developed by TokyoEastBranch</footer>

<script>
function updateClock(){
const n=new Date();
const f=v=>String(v).padStart(2,"0");
document.getElementById("clock").textContent=
`${n.getFullYear()}/${f(n.getMonth()+1)}/${f(n.getDate())} ${f(n.getHours())}:${f(n.getMinutes())}:${f(n.getSeconds())}`;
}
updateClock();
setInterval(updateClock,1000);
</script>
</body>
</html>
