<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>地震情報(X)簡易版</title>

<style>
body { font-family: sans-serif; max-width: 900px; margin: 40px auto; padding: 20px; background: #f5f5f5; }

#backBtn { display: inline-block; margin-bottom: 15px; padding: 10px 16px; background: #0066cc; color: white; text-decoration: none; border-radius: 8px; font-size: 14px; font-weight: bold; }
#backBtn:hover { background: #0055aa; }

h1 { text-align: center; margin-top: 0; color: #333; }

.buttons { display: flex; justify-content: center; gap: 10px; margin-bottom: 15px; }
button { padding: 10px 18px; font-size: 16px; border: none; border-radius: 8px; cursor: pointer; background: #003b80; color: white; }
button:hover { opacity: 0.85; }

#status { text-align: center; margin-bottom: 10px; color: green; font-size: 14px; }

.quake-card { 
    white-space: pre-line; background: white; border: 1px solid #ccc; 
    border-radius: 10px; padding: 20px; line-height: 1.8; 
    box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-bottom: 15px;
}
</style>
</head>
<body>

<a href="index.html" id="backBtn">← トップへ戻る</a>

<h1>地震情報(X）簡易版</h1>

<div class="buttons">
    <button onclick="loadQuake()">🔄 更新</button>
</div>

<div id="status">読み込み中...</div>
<div id="quakeList"></div>

<script>
async function loadQuake() {
    const list = document.getElementById("quakeList");
    const status = document.getElementById("status");
    
    // プロキシ経由で取得することでCORS制限を回避
    const API_URL = "https://api.allorigins.win/get?url=" + encodeURIComponent("https://api.p2pquake.net/v2/history?codes=551&limit=3");
    
    try {
        list.textContent = "取得中...";
        const res = await fetch(API_URL);
        const data = await res.json();
        const json = JSON.parse(data.contents);

        list.innerHTML = "";
        json.forEach(item => {
            const eq = item.earthquake;
            const time = new Date(eq.time).toLocaleString("ja-JP");
            const mag = eq.hypocenter.magnitude !== null ? "M" + parseFloat(eq.hypocenter.magnitude).toFixed(1) : "不明";
            
            const text = `【地震情報】
            ${time}頃、最大震度${scaleToShindo(eq.maxScale)}の地震がありました。
            震源地: ${eq.hypocenter.name || "不明"}
            深さ: ${eq.hypocenter.depth === 0 ? "ごく浅い" : eq.hypocenter.depth + "km"}
            マグニチュード: ${mag}`;

            const div = document.createElement("div");
            div.className = "quake-card";
            div.innerHTML = `${text.replace(/\n/g, '<br>')}<br><button onclick="copyText(this)">📋 コピー</button>`;
            list.appendChild(div);
        });
        status.textContent = "最終更新: " + new Date().toLocaleString("ja-JP");
    } catch (e) {
        list.textContent = "データ取得に失敗しました。時間をおいて再試行してください。";
        status.textContent = "エラー発生";
    }
}

function scaleToShindo(s){
    const map = {10:"1", 20:"2", 30:"3", 40:"4", 45:"5弱", 50:"5強", 55:"6弱", 60:"6強", 70:"7"};
    return map[s] || "不明";
}

function copyText(btn) {
    const text = btn.previousElementSibling.previousElementSibling.innerText;
    navigator.clipboard.writeText(text);
    btn.textContent = "✅ コピーしました";
    setTimeout(() => btn.textContent = "📋 コピー", 2000);
}

loadQuake();
</script>

</body>
</html>
